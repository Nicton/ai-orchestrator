<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Knowledge Assistant</title>
<style>
  :root {
    --bg: #ffffff;
    --ink: #202124;
    --muted: #5f6368;
    --line: #dfe1e5;
    --line-soft: #ecedef;
    --blue: #1a73e8;
    --blue-dark: #1557b0;
    --bg-soft: #f8f9fa;
    --shadow: 0 1px 6px rgba(32,33,36,.18);
    --shadow-lg: 0 4px 24px rgba(32,33,36,.18);
    --radius: 24px;
    --green: #188038;
    --amber: #e37400;
    --red: #d93025;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Arial, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .hidden { display: none !important; }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 18px; padding: 14px 22px; font-size: 14px;
    position: sticky; top: 0; background: var(--bg); z-index: 20;
  }
  .topbar .spacer { flex: 1; }
  .toplink { color: var(--muted); cursor: pointer; padding: 6px 8px; border-radius: 6px; }
  .toplink:hover { background: var(--bg-soft); color: var(--ink); }
  .usermenu { position: relative; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: var(--blue); color: #fff; font-weight: 600; font-size: 15px;
  }
  .menu {
    position: absolute; right: 0; top: 44px; background: #fff; min-width: 230px;
    border: 1px solid var(--line-soft); border-radius: 12px; box-shadow: var(--shadow-lg);
    padding: 8px; z-index: 30;
  }
  .menu .who { padding: 10px 12px; border-bottom: 1px solid var(--line-soft); margin-bottom: 6px; }
  .menu .who .nm { font-weight: 600; }
  .menu .who .em { color: var(--muted); font-size: 13px; }
  .menu .role-pill { display:inline-block; margin-top:6px; font-size:11px; padding:2px 8px; border-radius:10px; background:#e8f0fe; color:var(--blue-dark); }
  .menu button {
    display: block; width: 100%; text-align: left; border: none; background: none;
    padding: 10px 12px; border-radius: 8px; font-size: 14px; color: var(--ink);
  }
  .menu button:hover { background: var(--bg-soft); }

  /* ---------- login ---------- */
  .login-wrap { min-height: 78vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card {
    width: 100%; max-width: 400px; border: 1px solid var(--line-soft); border-radius: 16px;
    padding: 40px 36px; box-shadow: var(--shadow); text-align: center;
  }
  .login-card .logo { margin-bottom: 6px; }
  .login-card h1 { font-size: 22px; font-weight: 400; margin: 14px 0 4px; }
  .login-card p.sub { color: var(--muted); margin: 0 0 26px; font-size: 14px; }
  .field { text-align: left; margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 15px; outline: none;
  }
  .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,115,232,.15); }
  .btn-primary {
    width: 100%; background: var(--blue); color: #fff; border: none; border-radius: 8px;
    padding: 12px; font-size: 15px; font-weight: 500; margin-top: 6px;
  }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { opacity: .6; cursor: default; }
  .err { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 16px; }
  .login-hint { margin-top: 20px; font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* ---------- logo ---------- */
  .glogo { font-size: 46px; font-weight: 500; letter-spacing: -1px; user-select: none; }
  .glogo .c1{color:#4285F4}.glogo .c2{color:#EA4335}.glogo .c3{color:#FBBC05}.glogo .c4{color:#4285F4}.glogo .c5{color:#34A853}.glogo .c6{color:#EA4335}
  .gtag { color: var(--muted); font-size: 14px; margin-top: 6px; }

  /* ---------- search home ---------- */
  .home { display: flex; flex-direction: column; align-items: center; padding: 0 20px; }
  .home.centered { justify-content: center; min-height: 64vh; }
  .home.results { padding-top: 14px; }
  .home-logo { text-align: center; margin-bottom: 26px; }
  .home.results .home-logo { display: none; }

  .searchbar {
    width: 100%; max-width: 620px; display: flex; align-items: center; gap: 10px;
    border: 1px solid var(--line); border-radius: var(--radius); padding: 10px 18px;
    transition: box-shadow .15s, border-color .15s;
  }
  .searchbar:focus-within { box-shadow: var(--shadow); border-color: transparent; }
  .searchbar .ico { width: 20px; height: 20px; flex: none; color: var(--muted); }
  .searchbar input {
    flex: 1; border: none; outline: none; font-size: 16px; color: var(--ink); background: transparent;
    min-width: 0;
  }
  .mic {
    border: none; background: none; padding: 6px; border-radius: 50%; display: flex; align-items: center;
  }
  .mic:hover { background: var(--bg-soft); }
  .mic svg { width: 22px; height: 22px; }
  .mic.recording { background: #fce8e6; }
  .mic.recording svg { color: var(--red); }
  .home.results .searchbar { max-width: 690px; margin-left: 0; }

  .home-actions { margin-top: 26px; display: flex; gap: 10px; }
  .home-actions button {
    background: var(--bg-soft); border: 1px solid var(--bg-soft); color: #3c4043;
    padding: 9px 16px; border-radius: 6px; font-size: 14px;
  }
  .home-actions button:hover { border-color: var(--line); box-shadow: var(--shadow); }
  .voicehint { margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 18px; }

  /* ---------- results ---------- */
  .results-area { width: 100%; max-width: 720px; margin: 22px 0 80px; }
  .answer-meta { color: var(--muted); font-size: 13px; margin-bottom: 14px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:12px; background:var(--bg-soft); font-size:12px; color:#3c4043; }
  .conf-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }

  .answer {
    font-size: 16px; line-height: 1.7; color: #1f1f1f;
    border: 1px solid var(--line-soft); border-radius: 14px; padding: 22px 24px; background: #fff;
    box-shadow: var(--shadow);
  }
  .answer h1,.answer h2,.answer h3,.answer h4 { font-weight:600; line-height:1.3; margin:18px 0 8px; }
  .answer h1{font-size:20px}.answer h2{font-size:18px}.answer h3,.answer h4{font-size:16px}
  .answer p { margin: 0 0 12px; }
  .answer ul,.answer ol { margin: 0 0 12px; padding-left: 22px; }
  .answer li { margin: 4px 0; }
  .answer code { background: var(--bg-soft); padding: 1px 5px; border-radius: 4px; font-size: 14px; }
  .answer strong { font-weight: 600; }

  .sources { margin-top: 22px; }
  .sources h3 { font-size: 14px; color: var(--muted); font-weight: 500; margin: 0 0 12px; text-transform: uppercase; letter-spacing:.4px; }
  .source {
    border: 1px solid var(--line-soft); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
    transition: box-shadow .12s; background:#fff;
  }
  .source:hover { box-shadow: var(--shadow); }
  .source .s-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .source .s-title { font-size: 16px; color: var(--blue); }
  .source-badge { font-size:11px; font-weight:600; padding:2px 8px; border-radius:10px; }
  .badge-confluence { background:#deebff; color:#0747a6; }
  .badge-jira { background:#deebff; color:#0747a6; }
  .badge-web { background:#e6f4ea; color:#188038; }
  .badge-local { background:#f1f3f4; color:#5f6368; }
  .source .s-url { font-size: 13px; color: var(--green); word-break: break-all; }
  .source .s-path { font-size: 12px; color: var(--muted); }
  .source .s-snippet { font-size: 14px; color: #3c4043; margin-top: 6px; line-height:1.5; }

  /* ---------- rating + actions ---------- */
  .feedback-row {
    margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line-soft);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .rate-label { font-size: 14px; color: var(--muted); }
  .emojis { display: flex; gap: 4px; }
  .emoji {
    border: none; background: none; font-size: 26px; line-height: 1; padding: 4px; border-radius: 8px;
    filter: grayscale(1); opacity: .55; transition: transform .1s, filter .1s, opacity .1s;
  }
  .emoji:hover { transform: scale(1.18); filter: grayscale(0); opacity: 1; }
  .emoji.selected { filter: grayscale(0); opacity: 1; transform: scale(1.12); }
  .rate-thanks { font-size: 13px; color: var(--green); }
  .action-btn {
    border: 1px solid var(--line); background: #fff; color: #3c4043; border-radius: 18px;
    padding: 7px 14px; font-size: 13px; display:inline-flex; align-items:center; gap:6px;
  }
  .action-btn:hover { background: var(--bg-soft); }
  .loading { color: var(--muted); font-size: 15px; padding: 30px 0; display:flex; align-items:center; gap:10px; }
  .spinner { width:18px;height:18px;border:2px solid var(--line); border-top-color: var(--blue); border-radius:50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- drawer (history) ---------- */
  .drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,.32); z-index: 40; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 420px; max-width: 92vw; background: #fff;
    z-index: 41; box-shadow: -4px 0 24px rgba(0,0,0,.18); display: flex; flex-direction: column;
  }
  .drawer header { padding: 18px 20px; border-bottom: 1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; }
  .drawer header h2 { font-size: 17px; font-weight: 500; margin: 0; }
  .drawer .body { overflow-y: auto; padding: 12px 16px; }
  .hist-item { padding: 12px 8px; border-bottom: 1px solid var(--line-soft); cursor: pointer; border-radius:8px; }
  .hist-item:hover { background: var(--bg-soft); }
  .hist-q { font-size: 14px; color: var(--ink); margin-bottom: 4px; }
  .hist-meta { font-size: 12px; color: var(--muted); display:flex; gap:10px; flex-wrap:wrap; }
  .iconbtn { border:none; background:none; color:var(--muted); font-size:22px; line-height:1; padding:4px 8px; border-radius:8px; }
  .iconbtn:hover { background: var(--bg-soft); }
  .empty { color: var(--muted); font-size: 14px; padding: 24px 8px; text-align:center; }

  /* ---------- modal ---------- */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; display:flex; align-items:center; justify-content:center; padding: 20px; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); }
  .modal header { padding: 20px 24px 0; }
  .modal header h2 { font-size: 19px; font-weight: 500; margin: 0 0 4px; }
  .modal header p { color: var(--muted); font-size: 14px; margin: 0; }
  .modal .content { padding: 18px 24px; }
  .modal textarea {
    width: 100%; min-height: 110px; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    font-size: 15px; font-family: inherit; resize: vertical; outline: none;
  }
  .modal textarea:focus { border-color: var(--blue); }
  .modal .footer { padding: 0 24px 22px; display: flex; justify-content: flex-end; gap: 10px; align-items:center; }
  .btn-text { background: none; border: none; color: var(--blue); padding: 10px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .btn-text:hover { background: #f0f6ff; }
  .btn-fill { background: var(--blue); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .btn-fill:hover { background: var(--blue-dark); }
  .modal-mic { margin-right: auto; display:flex; align-items:center; gap:10px; }
  .mic-lg { border:1px solid var(--line); background:#fff; border-radius:50%; width:42px; height:42px; display:flex; align-items:center; justify-content:center; }
  .mic-lg.recording { background:#fce8e6; border-color:#fce8e6; }
  .mic-lg svg { width:22px; height:22px; color:var(--muted); }
  .mic-lg.recording svg { color: var(--red); }
  .mic-state { font-size: 12px; color: var(--muted); }
  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%); background:#202124; color:#fff; padding:12px 20px; border-radius:8px; font-size:14px; z-index:60; box-shadow: var(--shadow-lg); }
</style>
</head>
<body>

<!-- ============ TOP BAR ============ -->
<div class="topbar" id="topbar" style="display:none">
  <span class="spacer"></span>
  <span class="toplink" id="histBtn">History</span>
  <span class="toplink" id="adminBtn" style="display:none">Admin</span>
  <div class="usermenu">
    <button class="avatar" id="avatarBtn">U</button>
    <div class="menu hidden" id="userMenu">
      <div class="who">
        <div class="nm" id="menuName">—</div>
        <div class="em" id="menuEmail">—</div>
        <span class="role-pill" id="menuRole">user</span>
      </div>
      <button id="menuChangePw">Change password</button>
      <button id="menuLogout">Sign out</button>
    </div>
  </div>
</div>

<!-- ============ LOGIN ============ -->
<div id="view-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo glogo" style="font-size:34px"><span class="c1">K</span><span class="c2">n</span><span class="c3">o</span><span class="c4">w</span><span class="c5">i</span></div>
      <h1>Knowledge Assistant</h1>
      <p class="sub">Sign in with your work email</p>
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="username" placeholder="you@company.com" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button class="btn-primary" id="loginSubmit" type="submit">Sign in</button>
        <div class="err" id="loginErr"></div>
      </form>
      <div class="login-hint">Accounts are created by an administrator. Ask your admin to send you access.</div>
    </div>
  </div>
</div>

<!-- ============ SEARCH / HOME ============ -->
<div id="view-home" style="display:none">
  <div class="home centered" id="home">
    <div class="home-logo">
      <div class="glogo"><span class="c1">K</span><span class="c2">n</span><span class="c3">o</span><span class="c4">w</span><span class="c5">l</span><span class="c6">y</span></div>
      <div class="gtag">Ask anything about our products, processes and docs</div>
    </div>

    <div class="searchbar">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" placeholder="Ask a question…" autocomplete="off" />
      <button class="mic" id="micBtn" title="Search by voice" aria-label="Search by voice">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z" fill="currentColor"/></svg>
      </button>
    </div>
    <div class="voicehint" id="voicehint"></div>

    <div class="home-actions" id="homeActions">
      <button id="askBtn">Ask Knowly</button>
      <button id="luckyBtn">I'm feeling curious</button>
    </div>

    <div class="results-area" id="resultsArea" style="display:none"></div>
  </div>
</div>

<!-- ============ HISTORY DRAWER (mount point) ============ -->
<div id="drawerMount"></div>
<!-- ============ MODAL (mount point) ============ -->
<div id="modalMount"></div>
<div id="toastMount"></div>

<script>
const API = {
  me: () => fetch('/api/auth/me').then(r => r.ok ? r.json() : null),
  login: (email, password) => fetch('/api/auth/login', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({email, password}) }),
  logout: () => fetch('/api/auth/logout', { method:'POST' }),
  changePw: (currentPassword, newPassword) => fetch('/api/auth/change-password', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({currentPassword, newPassword}) }),
  ask: (question, inputMode) => fetch('/api/knowledge/ask', { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({question, inputMode}) }),
  rate: (id, rating) => fetch(`/api/knowledge/queries/${id}/rating`, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({rating}) }),
  feedback: (id, kind, text, rating) => fetch(`/api/knowledge/queries/${id}/feedback`, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({kind, text, rating}) }),
  correction: (id, text) => fetch(`/api/knowledge/queries/${id}/correction`, { method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({text}) }),
  history: () => fetch('/api/knowledge/history').then(r => r.ok ? r.json() : {queries:[]}),
};

let currentUser = null;
let lastQuery = null; // { id, rating }

// ---------- helpers ----------
function $(id){ return document.getElementById(id); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ return (name||'U').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function toast(msg){
  const m = $('toastMount');
  m.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  setTimeout(()=>{ m.innerHTML=''; }, 2600);
}

// Minimal, safe markdown -> HTML (escape first, then format)
function renderMarkdown(src){
  const esc = escapeHtml(src);
  const lines = esc.split(/\r?\n/);
  let html = '', inUl = false, inOl = false;
  const closeLists = () => { if(inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} };
  const inline = (t) => t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  for (let raw of lines){
    const line = raw.trimEnd();
    let m;
    if ((m = line.match(/^(#{1,4})\s+(.*)$/))){ closeLists(); html += `<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`; continue; }
    if ((m = line.match(/^\s*[-*]\s+(.*)$/))){ if(!inUl){closeLists();html+='<ul>';inUl=true;} html += `<li>${inline(m[1])}</li>`; continue; }
    if ((m = line.match(/^\s*\d+[.)]\s+(.*)$/))){ if(!inOl){closeLists();html+='<ol>';inOl=true;} html += `<li>${inline(m[1])}</li>`; continue; }
    if (line.trim() === ''){ closeLists(); continue; }
    closeLists(); html += `<p>${inline(line)}</p>`;
  }
  closeLists();
  return html;
}

function confColor(c){ if(c>=0.6) return 'var(--green)'; if(c>=0.4) return 'var(--amber)'; return 'var(--red)'; }

// ---------- voice (Web Speech API) ----------
function makeRecognizer(onText, onState){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = (navigator.language || 'en-US');
  rec.interimResults = true;
  rec.continuous = false;
  let finalText = '';
  rec.onresult = (e) => {
    let interim = '';
    finalText = '';
    for (let i=0;i<e.results.length;i++){
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t; else interim += t;
    }
    onText(finalText || interim, !!finalText);
  };
  rec.onerror = (e) => onState('error', e.error);
  rec.onstart = () => onState('start');
  rec.onend = () => onState('end');
  return rec;
}

// ===================================================================
// AUTH FLOW
// ===================================================================
async function boot(){
  const res = await API.me();
  if (res && res.user){ currentUser = res.user; showApp(); }
  else { showLogin(); }
}

function showLogin(){
  $('view-login').style.display = '';
  $('view-home').style.display = 'none';
  $('topbar').style.display = 'none';
  $('loginEmail').focus();
  // Pre-fill email from ?email= (access link)
  const params = new URLSearchParams(location.search);
  if (params.get('email')) $('loginEmail').value = params.get('email');
}

function showApp(){
  $('view-login').style.display = 'none';
  $('view-home').style.display = '';
  $('topbar').style.display = 'flex';
  $('avatarBtn').textContent = initials(currentUser.name);
  $('menuName').textContent = currentUser.name;
  $('menuEmail').textContent = currentUser.email;
  $('menuRole').textContent = currentUser.role;
  $('adminBtn').style.display = currentUser.role === 'admin' ? '' : 'none';
  $('q').focus();
}

$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = $('loginSubmit'); const err = $('loginErr');
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await API.login($('loginEmail').value.trim(), $('loginPassword').value);
    const data = await r.json().catch(()=>({}));
    if (!r.ok){ err.textContent = data.error || 'Sign in failed'; return; }
    currentUser = data.user; showApp();
  } catch(_){ err.textContent = 'Network error'; }
  finally { btn.disabled = false; btn.textContent = 'Sign in'; }
});

// ---------- user menu ----------
$('avatarBtn').addEventListener('click', (e) => { e.stopPropagation(); $('userMenu').classList.toggle('hidden'); });
document.addEventListener('click', () => $('userMenu').classList.add('hidden'));
$('userMenu').addEventListener('click', (e) => e.stopPropagation());
$('menuLogout').addEventListener('click', async () => { await API.logout(); currentUser = null; location.href = '/'; });
$('adminBtn').addEventListener('click', () => location.href = '/admin');
$('menuChangePw').addEventListener('click', () => { $('userMenu').classList.add('hidden'); openChangePassword(); });

// ===================================================================
// SEARCH
// ===================================================================
let pendingInputMode = 'text';

async function runSearch(){
  const q = $('q').value.trim();
  if (q.length < 3) { toast('Type a longer question'); return; }
  const inputMode = pendingInputMode; pendingInputMode = 'text';
  $('home').classList.remove('centered'); $('home').classList.add('results');
  const area = $('resultsArea');
  area.style.display = '';
  area.innerHTML = `<div class="loading"><span class="spinner"></span> Searching the knowledge base…</div>`;
  try {
    const r = await API.ask(q, inputMode);
    if (r.status === 401){ showLogin(); return; }
    const data = await r.json();
    if (!r.ok){ area.innerHTML = `<div class="empty">${escapeHtml(data.error||'Something went wrong')}</div>`; return; }
    lastQuery = { id: data.queryId, rating: null };
    renderAnswer(data);
  } catch(_){ area.innerHTML = `<div class="empty">Network error. Please try again.</div>`; }
}

function sourceBadge(type){
  const t = (type||'local');
  const label = t === 'confluence' ? 'Confluence' : t === 'jira' ? 'Jira' : t === 'web' ? 'Web' : 'Local doc';
  return `<span class="source-badge badge-${t}">${label}</span>`;
}

function renderAnswer(data){
  const area = $('resultsArea');
  const conf = typeof data.confidence === 'number' ? data.confidence : 0;
  const sources = (data.sources || []);
  const sourcesHtml = sources.length ? `
    <div class="sources">
      <h3>Sources</h3>
      ${sources.map(s => {
        const hasUrl = !!s.sourceUrl;
        const titleHtml = hasUrl
          ? `<a class="s-title" href="${escapeHtml(s.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(s.title)}</a>`
          : `<span class="s-title">${escapeHtml(s.title)}</span>`;
        return `<div class="source">
          <div class="s-top">${sourceBadge(s.sourceType)} ${titleHtml}</div>
          ${hasUrl ? `<div class="s-url">${escapeHtml(s.sourceUrl)}</div>` : `<div class="s-path">${escapeHtml(s.path||'')}</div>`}
          ${s.snippet ? `<div class="s-snippet">${escapeHtml(s.snippet)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>` : '';

  area.innerHTML = `
    <div class="answer-meta">
      <span class="chip"><span class="conf-dot" style="background:${confColor(conf)}"></span> ${Math.round(conf*100)}% confidence</span>
      ${data.intent ? `<span class="chip">${escapeHtml(data.intent)}</span>` : ''}
      <span class="chip">${data.latencyMs||0} ms</span>
      <span class="chip">${sources.length} source${sources.length===1?'':'s'}</span>
    </div>
    <div class="answer">${renderMarkdown(data.answer||'')}</div>
    ${sourcesHtml}
    <div class="feedback-row">
      <span class="rate-label">Was this helpful?</span>
      <div class="emojis" id="emojis">
        ${[1,2,3,4,5].map(n => `<button class="emoji" data-rating="${n}" title="${['Very unhappy','Unhappy','Neutral','Happy','Very happy'][n-1]}">${['😣','🙁','😐','🙂','😄'][n-1]}</button>`).join('')}
      </div>
      <span class="rate-thanks" id="rateThanks"></span>
      <span style="flex:1"></span>
      <button class="action-btn" id="suggestBtn">✏️ Suggest a correction</button>
    </div>
  `;

  area.querySelectorAll('.emoji').forEach(btn => {
    btn.addEventListener('click', () => onRate(parseInt(btn.dataset.rating,10)));
  });
  $('suggestBtn').addEventListener('click', openCorrection);
  area.scrollIntoView({ behavior:'smooth', block:'start' });
}

async function onRate(rating){
  if (!lastQuery) return;
  lastQuery.rating = rating;
  document.querySelectorAll('#emojis .emoji').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.rating,10) === rating);
  });
  $('rateThanks').textContent = 'Thanks for the feedback';
  try {
    const r = await API.rate(lastQuery.id, rating);
    const data = await r.json().catch(()=>({}));
    if (r.ok && data.feedbackRequired) openFeedback(rating);
  } catch(_){}
}

$('askBtn').addEventListener('click', runSearch);
$('luckyBtn').addEventListener('click', () => {
  const samples = ['Which systems are affected when we add a new carrier type in TMS?','How do carrier billing rules get resolved?','What is the production deployment runbook?','How do I onboard a new engineer?'];
  $('q').value = samples[Math.floor(Math.random()*samples.length)];
  runSearch();
});
$('q').addEventListener('keydown', (e) => { if (e.key === 'Enter') runSearch(); });

// ---------- voice search ----------
const voiceHint = $('voicehint');
let searchRec = null, searchRecording = false;
$('micBtn').addEventListener('click', () => {
  if (searchRecording && searchRec){ searchRec.stop(); return; }
  searchRec = makeRecognizer(
    (text) => { $('q').value = text; },
    (state) => {
      if (state === 'start'){ searchRecording = true; $('micBtn').classList.add('recording'); voiceHint.textContent = '🎙️ Listening… speak your question'; }
      if (state === 'end'){ searchRecording = false; $('micBtn').classList.remove('recording'); voiceHint.textContent = $('q').value ? '' : ''; if($('q').value.trim().length>=3){ pendingInputMode='voice'; setTimeout(runSearch, 250);} }
      if (state === 'error'){ searchRecording = false; $('micBtn').classList.remove('recording'); voiceHint.textContent = 'Voice input unavailable in this browser.'; }
    }
  );
  if (!searchRec){ voiceHint.textContent = 'Voice input is not supported in this browser. Try Chrome.'; return; }
  searchRec.start();
});

// ===================================================================
// FEEDBACK MODAL (auto-opens when rating < 4)
// ===================================================================
function openFeedback(rating){
  const mount = $('modalMount');
  mount.innerHTML = `
    <div class="modal-bg" id="fbBg">
      <div class="modal">
        <header>
          <h2>Help us improve this answer</h2>
          <p>You rated this ${['very unhappy','unhappy','neutral'][rating-1]||'low'}. Tell us what was wrong — by voice or text.</p>
        </header>
        <div class="content">
          <textarea id="fbText" placeholder="What was missing, wrong, or unclear?"></textarea>
        </div>
        <div class="footer">
          <div class="modal-mic">
            <button class="mic-lg" id="fbMic" title="Dictate feedback">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3z"/><path d="M19 11a7 7 0 0 1-14 0H3a9 9 0 0 0 8 8.94V23h2v-3.06A9 9 0 0 0 21 11h-2z"/></svg>
            </button>
            <span class="mic-state" id="fbMicState">or type below</span>
          </div>
          <button class="btn-text" id="fbSkip">Skip</button>
          <button class="btn-fill" id="fbSend">Send feedback</button>
        </div>
      </div>
    </div>`;
  let fbKind = 'text';
  $('fbText').focus();
  $('fbSkip').addEventListener('click', closeModal);
  $('fbBg').addEventListener('click', (e)=>{ if(e.target.id==='fbBg') closeModal(); });
  $('fbSend').addEventListener('click', async () => {
    const text = $('fbText').value.trim();
    if (!text){ $('fbText').focus(); return; }
    try { await API.feedback(lastQuery.id, fbKind, text, rating); toast('Feedback saved — thank you'); } catch(_){}
    closeModal();
  });
  // voice feedback
  let rec=null, recording=false;
  $('fbMic').addEventListener('click', () => {
    if (recording && rec){ rec.stop(); return; }
    rec = makeRecognizer(
      (t)=>{ $('fbText').value = t; fbKind='voice'; },
      (state)=>{
        if(state==='start'){ recording=true; $('fbMic').classList.add('recording'); $('fbMicState').textContent='Listening…'; }
        if(state==='end'){ recording=false; $('fbMic').classList.remove('recording'); $('fbMicState').textContent = $('fbText').value ? 'Captured by voice' : 'or type below'; }
        if(state==='error'){ recording=false; $('fbMic').classList.remove('recording'); $('fbMicState').textContent='Voice unavailable'; }
      });
    if(!rec){ $('fbMicState').textContent='Voice not supported (try Chrome)'; return; }
    rec.start();
  });
}

// ===================================================================
// CORRECTION MODAL
// ===================================================================
function openCorrection(){
  if (!lastQuery) return;
  const mount = $('modalMount');
  mount.innerHTML = `
    <div class="modal-bg" id="crBg">
      <div class="modal">
        <header>
          <h2>Suggest a correction</h2>
          <p>Propose a fix or clarification for this answer. It will be logged for the docs team.</p>
        </header>
        <div class="content">
          <textarea id="crText" placeholder="The correct answer / what should change…"></textarea>
        </div>
        <div class="footer">
          <button class="btn-text" id="crCancel">Cancel</button>
          <button class="btn-fill" id="crSend">Submit correction</button>
        </div>
      </div>
    </div>`;
  $('crText').focus();
  $('crCancel').addEventListener('click', closeModal);
  $('crBg').addEventListener('click', (e)=>{ if(e.target.id==='crBg') closeModal(); });
  $('crSend').addEventListener('click', async () => {
    const text = $('crText').value.trim();
    if (!text){ $('crText').focus(); return; }
    try { await API.correction(lastQuery.id, text); toast('Correction submitted — thank you'); } catch(_){}
    closeModal();
  });
}

// ===================================================================
// CHANGE PASSWORD MODAL
// ===================================================================
function openChangePassword(){
  const mount = $('modalMount');
  mount.innerHTML = `
    <div class="modal-bg" id="pwBg">
      <div class="modal">
        <header><h2>Change password</h2><p>Update your account password.</p></header>
        <div class="content">
          <div class="field"><label>Current password</label><input id="pwCur" type="password" /></div>
          <div class="field"><label>New password (min 6 chars)</label><input id="pwNew" type="password" /></div>
          <div class="err" id="pwErr"></div>
        </div>
        <div class="footer">
          <button class="btn-text" id="pwCancel">Cancel</button>
          <button class="btn-fill" id="pwSend">Update</button>
        </div>
      </div>
    </div>`;
  $('pwCur').focus();
  $('pwCancel').addEventListener('click', closeModal);
  $('pwBg').addEventListener('click', (e)=>{ if(e.target.id==='pwBg') closeModal(); });
  $('pwSend').addEventListener('click', async () => {
    const cur = $('pwCur').value, nw = $('pwNew').value;
    if (nw.length < 6){ $('pwErr').textContent = 'New password too short'; return; }
    const r = await API.changePw(cur, nw);
    const data = await r.json().catch(()=>({}));
    if (!r.ok){ $('pwErr').textContent = data.error || 'Failed'; return; }
    closeModal(); toast('Password updated');
  });
}

function closeModal(){ $('modalMount').innerHTML = ''; }

// ===================================================================
// HISTORY DRAWER
// ===================================================================
$('histBtn').addEventListener('click', openHistory);
async function openHistory(){
  const mount = $('drawerMount');
  mount.innerHTML = `
    <div class="drawer-bg" id="drBg"></div>
    <div class="drawer">
      <header><h2>Your history</h2><button class="iconbtn" id="drClose">×</button></header>
      <div class="body" id="drBody"><div class="loading"><span class="spinner"></span> Loading…</div></div>
    </div>`;
  $('drClose').addEventListener('click', closeDrawer);
  $('drBg').addEventListener('click', closeDrawer);
  const data = await API.history();
  const body = $('drBody');
  if (!data.queries || !data.queries.length){ body.innerHTML = `<div class="empty">No questions yet.</div>`; return; }
  body.innerHTML = data.queries.map(q => `
    <div class="hist-item" data-q="${escapeHtml(q.question)}">
      <div class="hist-q">${escapeHtml(q.question)}</div>
      <div class="hist-meta">
        <span>${new Date(q.createdAt).toLocaleString()}</span>
        ${q.rating ? `<span>${['😣','🙁','😐','🙂','😄'][q.rating-1]}</span>` : ''}
        <span>${q.sourceCount} src</span>
        ${q.inputMode==='voice' ? '<span>🎙️ voice</span>' : ''}
      </div>
    </div>`).join('');
  body.querySelectorAll('.hist-item').forEach(el => {
    el.addEventListener('click', () => { $('q').value = el.dataset.q; closeDrawer(); runSearch(); });
  });
}
function closeDrawer(){ $('drawerMount').innerHTML = ''; }

// go
boot();
</script>
