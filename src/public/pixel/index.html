<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Office (MVP)</title>
  <style>
    body { margin:0; font-family: Inter, system-ui, Arial, sans-serif; background:#0b1020; color:#eaf0ff; }
    .top { display:flex; gap:12px; align-items:center; padding:12px 16px; border-bottom:1px solid #24325f; background:#0b1020; position:sticky; top:0; }
    .pill{ padding:2px 10px; border-radius:999px; font-size:12px; font-weight:800; border:1px solid #314275; background:#141b34; }
    a { color:#9fb0e6; text-decoration:none; }
    a:hover{ text-decoration:underline; }
    #wrap { padding:12px 16px; }
    canvas { border:1px solid #273467; border-radius:14px; background:#0b1020; width:100%; max-width:1200px; height:auto; image-rendering: pixelated; image-rendering: crisp-edges; }
    .muted{ color:#9fb0e6; font-size:13px; }
    .grid{ display:grid; grid-template-columns: 1fr 360px; gap:16px; align-items:start; }
    @media (max-width: 980px){ .grid{ grid-template-columns: 1fr; } }
    pre{ white-space:pre-wrap; background:#0b1020; border:1px solid #273467; border-radius:14px; padding:10px; max-height:280px; overflow:auto; }
    button { background:#5f7cff; border:none; color:white; padding:8px 12px; border-radius:10px; font-weight:700; cursor:pointer; }
    input{ background:#0b1020; color:#eaf0ff; border:1px solid #314275; border-radius:10px; padding:8px 10px; }
  </style>
</head>
<body>
  <div class="top">
    <div style="font-weight:900;">Pixel Office (MVP)</div>
    <span class="pill" id="status">connecting…</span>
    <span class="muted">source: <code>/api/events</code></span>
    <span style="flex:1"></span>
    <a href="/">← back</a>
  </div>

  <div id="wrap" class="grid">
    <div>
      <canvas id="c" width="960" height="540"></canvas>
      <div class="muted" style="margin-top:10px; max-width:1200px;">
        Agents are placed on a simple grid. Animation state is derived from the latest event per agent.
      </div>
    </div>
    <div>
      <div class="muted">Controls</div>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px;">
        <button id="btnRefresh">Refresh now</button>
        <span class="muted">poll</span>
        <input id="pollMs" value="1000" style="width:90px;" />
        <span class="muted">ms</span>
      </div>
      <div class="muted" style="margin-top:12px;">Selected</div>
      <pre id="sel">(click an agent)</pre>
    </div>
  </div>

  <script type="module" src="./pixel.js"></script>
</body>
</html>
