<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchify — Task Testing</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/theme.css" />
<script>(function(){try{var t=localStorage.getItem('searchify_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',Roboto,Arial,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  a { color:var(--blue); text-decoration:none; }
  button,input,select,textarea { font-family:inherit; }
  .wrap { max-width:1080px; margin:22px auto; padding:0 18px 80px; }
  h1 { font-size:22px; font-weight:600; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 20px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); margin-bottom:18px; }
  .panel > h3 { margin:0; padding:13px 18px; font-size:15px; border-bottom:1px solid var(--line); font-weight:600; }
  .pad { padding:16px 18px; }
  label.fld { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.3px; color:var(--muted); margin:0 0 5px; }
  input[type=text] { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink); }
  .row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
  button.pri { background:var(--blue); color:#fff; border:none; border-radius:8px; padding:11px 18px; font-size:14px; font-weight:500; cursor:pointer; }
  button.pri:hover { background:var(--blue-dark); } button.pri:disabled { opacity:.55; cursor:default; }
  button.ghost { border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; }
  .muted { color:var(--muted); font-size:13px; }
  .err { color:var(--red); font-size:13px; margin-top:10px; min-height:16px; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .chip { display:inline-block; padding:3px 10px; border-radius:9px; font-size:12px; background:var(--bg-soft); border:1px solid var(--line); }
  .chip.code { background:#eef4ff; border-color:#cdddff; }
  .stagelog { font-size:12px; color:var(--muted); padding:0 0 8px; min-height:16px; }
  .llmlog { white-space:pre-wrap; background:#0d1117; color:#c9d1d9; border-radius:8px; padding:10px; font-size:11px; line-height:1.45; max-height:180px; overflow:auto; margin:8px 0; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--blue); border-radius:50%; animation:sp .8s linear infinite; vertical-align:-2px; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .report { font-size:14px; line-height:1.6; }
  .report h2 { font-size:17px; margin:22px 0 8px; padding-top:10px; border-top:1px solid var(--line); }
  .report h2:first-child { border-top:none; padding-top:0; margin-top:0; }
  .report h3 { font-size:15px; margin:16px 0 6px; }
  .report p { margin:0 0 10px; }
  .report ul,.report ol { margin:0 0 12px; padding-left:22px; }
  .report li { margin:4px 0; }
  .report code { background:var(--bg-soft); padding:1px 5px; border-radius:4px; font-size:13px; }
  .report pre.md-code { background:#0d1117; color:#c9d1d9; border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin:0 0 14px; overflow-x:auto; font-size:12.5px; line-height:1.5; }
  .report pre.md-code code { background:none; padding:0; color:inherit; font-family:ui-monospace,Consolas,monospace; white-space:pre; }
  .report table { border-collapse:collapse; width:100%; margin:0 0 12px; font-size:13px; }
  .report th,.report td { border:1px solid var(--line); padding:6px 9px; text-align:left; }
  .hidden { display:none !important; }
  .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
  /* report TOC + collapsible blocks */
  .toc { position:sticky; top:8px; background:var(--bg-soft); border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin:0 0 14px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; z-index:5; }
  .toc-head { font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); margin-right:2px; }
  .toc-item { border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:7px; padding:5px 9px; font-size:12.5px; cursor:pointer; }
  .toc-item:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
  .block { border:1px solid var(--line); border-radius:10px; margin-bottom:12px; overflow:hidden; }
  .block-h { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:11px 14px; background:var(--bg-soft); cursor:pointer; user-select:none; font-weight:600; font-size:15px; }
  .block-h .chev { color:var(--muted); font-size:12px; transition:transform .15s; }
  .block.collapsed .block-h .chev { transform:rotate(-90deg); }
  .block.collapsed .block-body { display:none; }
  .block-body { padding:4px 16px 12px; }
  .block-body h3 { margin-top:14px; }
  /* history drawer */
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:60; display:none; }
  .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:min(420px,92vw); background:var(--panel); border-left:1px solid var(--line); box-shadow:-8px 0 24px rgba(0,0,0,.18); z-index:61; transform:translateX(100%); transition:transform .2s ease; display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { margin:0; padding:14px 18px; border-bottom:1px solid var(--line); font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .drawer .list { flex:1; overflow:auto; padding:12px 14px; }
  .hist-item { border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:10px; cursor:pointer; }
  .hist-item:hover { background:var(--bg-soft); }
  .hist-top { display:flex; justify-content:space-between; gap:8px; align-items:center; }
  .hist-title { font-size:14px; font-weight:500; }
  .hist-meta { color:var(--muted); font-size:12px; margin-top:4px; }
  .hist-del { border:none; background:none; color:var(--muted); cursor:pointer; font-size:13px; }
  .hist-del:hover { color:var(--red); }
</style>
</head>

function t(k){ return (I18N[L]&&I18N[L][k])||I18N.en[k]||k; }
function applyLang(){
  document.title=t('title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.getAttribute('data-i18n')); });
  $('runBtn').textContent=t('run'); $('copyBtn').textContent=t('copy');
  $('copyLinkBtn').textContent=t('copyLink'); $('expandAllBtn').textContent=t('expandAll'); $('collapseAllBtn').textContent=t('collapseAll');
  $('historyBtn').textContent=t('history'); $('taskBtn').textContent=t('taskBtn');
  if(!taskEdited && !$('taskText').value) $('taskText').value=t('taskDefault');
}

// ---------- minimal markdown renderer (headings, lists, tables, fenced code, inline) ----------
function renderMarkdown(src){
  const esc2=esc; const lines=esc2(src).split(/\r?\n/);
  let html='',inUl=false,inOl=false;
  const closeLists=()=>{ if(inUl){html+='</ul>';inUl=false;} if(inOl){html+='</ol>';inOl=false;} };
  const isT=(l)=>/^\s*\|.*\|\s*$/.test(l);
  const isSep=(l)=>{ const x=l.trim(); return isT(x)&&/^\|?(\s*:?-{3,}:?\s*\|)+\s*$/.test(x); };
  const cells=(l)=>l.trim().replace(/^\|/,'').replace(/\|$/,'').split('|').map(c=>c.trim());
  const inline=(x)=>x.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
  for(let i=0;i<lines.length;i++){
    const line=lines[i].replace(/\s+$/,''); let m;
    if(/^\s*```/.test(line)){ closeLists(); const lang=line.replace(/^\s*```/,'').trim(); const buf=[]; i++;
      while(i<lines.length&&!/^\s*```/.test(lines[i])){ buf.push(lines[i]); i++; }
      html+=`<pre class="md-code"${lang?` data-lang="${lang}"`:''}><code>${buf.join('\n')}</code></pre>`; continue; }
    if(isT(line)&&isSep(lines[i+1]||'')){ closeLists(); const h=cells(line); const rows=[]; let o=i+2;
      while(o<lines.length&&isT(lines[o])){ rows.push(cells(lines[o])); o++; }
      html+=`<table><thead><tr>${h.map(c=>`<th>${inline(c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${h.map((_,j)=>`<td>${inline(r[j]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`; i=o-1; continue; }
    if((m=line.match(/^(#{1,4})\s+(.*)$/))){ closeLists(); const lv=Math.min(m[1].length+1,4); html+=`<h${lv}>${inline(m[2])}</h${lv}>`; continue; }
    if((m=line.match(/^\s*[-*]\s+(.*)$/))){ if(!inUl){closeLists();html+='<ul>';inUl=true;} html+=`<li>${inline(m[1])}</li>`; continue; }
    if((m=line.match(/^\s*\d+[.)]\s+(.*)$/))){ if(!inOl){closeLists();html+='<ol>';inOl=true;} html+=`<li>${inline(m[1])}</li>`; continue; }
    if(line.trim()===''){ closeLists(); continue; }
    closeLists(); html+=`<p>${inline(line)}</p>`;
  }
  closeLists(); return html;
}

async function boot(){
  applyLang();
  const r=await fetch('/api/auth/me'); if(!r.ok){ location.href='/login'; return; }
  const cfg=await fetch('/api/testing/config').then(r=>r.json()).catch(()=>({jiraEnabled:false,repos:0}));
  if(!cfg.jiraEnabled){ $('configWarn').style.display=''; $('runBtn').disabled=true; }
  $('repoNote').textContent = cfg.repos>0 ? t('reposFull')(cfg.repos) : t('reposNone');
}

$('key').addEventListener('keydown', e=>{ if(e.key==='Enter') run(); });
$('runBtn').addEventListener('click', run);
let reportText='';
async function run(){
  $('inErr').textContent='';
  // accept a bare key OR a full Jira URL/text (e.g. https://…/browse/TMS-3726)
  const km=$('key').value.toUpperCase().match(/([A-Z][A-Z0-9]+-\d+)/);
  const key=km?km[1]:'';
  if(!key){ $('inErr').textContent=t('repoErr'); return; }
  $('resultPanel').classList.remove('hidden');
  $('report').innerHTML=''; $('metaChips').innerHTML=''; $('repTok').textContent=''; reportText='';
  $('llmLog').textContent=''; $('llmLog').classList.add('hidden');
  $('stageLog').innerHTML='<span class="spin"></span> …';
  const btn=$('runBtn'); btn.disabled=true;
  let llmBuf='';
  try {
    const res=await fetch('/api/testing/analyze/stream',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key,lang:L})});
    if(!res.ok||!res.body){ const tx=await res.text().catch(()=>''); $('stageLog').textContent='⚠️ '+(tx||t('analyzeErr')); return; }
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='', result=null;
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop()||'';
      for(const block of parts){
        const ev=(block.match(/^event: (.*)$/m)||[])[1]; const dm=block.match(/^data: (.*)$/m);
        if(!ev||!dm) continue; let data; try{ data=JSON.parse(dm[1]); }catch(_){ continue; }
        if(ev==='stage'){ $('stageLog').innerHTML='<span class="spin"></span> '+esc(data.msg||''); }
        else if(ev==='delta'){ llmBuf+=data.text||''; $('llmLog').classList.remove('hidden'); $('llmLog').textContent=llmBuf; $('llmLog').scrollTop=$('llmLog').scrollHeight; }
        else if(ev==='result'){ result=data; }
        else if(ev==='error'){ $('stageLog').textContent='⚠️ '+(data.message||t('analyzeErr')); }
      }
    }
    if(result){ renderResult(result); }
  } catch(_){ $('stageLog').textContent='⚠️ '+t('netErr'); }
  finally { btn.disabled=false; }
}

let reportMeta=null, reportKey='', currentAnswerId=null;

// Render the report as a TOC + collapsible blocks (sections split on "## ").
function renderReport(md){
  const lines=(md||'').split(/\r?\n/); const sections=[]; let cur=null; const pre=[];
  for(const ln of lines){ const m=ln.match(/^##\s+(.*)$/); if(m){ cur={title:m[1].trim(),body:[]}; sections.push(cur); } else if(cur){ cur.body.push(ln); } else pre.push(ln); }
  if(sections.length>1){
    $('toc').style.display='';
    $('toc').innerHTML=`<span class="toc-head">${esc(t('contents'))}</span>`+sections.map((s,i)=>`<button class="toc-item" data-sec="${i}">${esc(s.title)}</button>`).join('');
  } else { $('toc').style.display='none'; $('toc').innerHTML=''; }
  let html='';
  if(pre.join('').trim()) html+=`<div style="margin-bottom:12px">${renderMarkdown(pre.join('\n'))}</div>`;
  sections.forEach((s,i)=>{ html+=`<div class="block" id="sec${i}"><div class="block-h"><span>${esc(s.title)}</span><span class="chev">▾</span></div><div class="block-body">${renderMarkdown(s.body.join('\n'))}</div></div>`; });
  $('report').innerHTML=html;
  $('report').querySelectorAll('.block-h').forEach(h=> h.addEventListener('click', ()=> h.parentElement.classList.toggle('collapsed')));
  $('toc').querySelectorAll('.toc-item').forEach(b=> b.addEventListener('click', ()=>{ const el=$('sec'+b.dataset.sec); if(el){ el.classList.remove('collapsed'); el.scrollIntoView({behavior:'smooth',block:'start'}); } }));
}

function displayReport(report, meta, key, answerId){
  $('stageLog').textContent=''; $('llmLog').classList.add('hidden');
  reportText=report||''; reportMeta=meta||{}; reportKey=key||''; currentAnswerId=answerId||null;
  const m=reportMeta;
  const chips=[];
  if(m.issue) chips.push(`<span class="chip"><b>${esc(reportKey)}</b> · ${esc(m.issue.type||'')} · ${esc(m.issue.status||'')}</span>`);
  (m.related||[]).forEach(x=> chips.push(`<span class="chip">${esc(x.rel||'')}: ${esc(x.key)}</span>`));
  (m.branches||[]).forEach(b=> chips.push(`<span class="chip code">🔀 ${esc(b.repo)}:${esc(b.branch)} · ${b.files} files</span>`));
  $('metaChips').innerHTML = chips.length?`<div class="chips" style="margin-bottom:12px">${chips.join('')}</div>`:'';
  $('repTok').textContent = m.tokens?`· ${m.tokens} токенов`:'';
  renderReport(reportText);
  $('reportTools').style.display='';
  $('copyLinkBtn').style.display = currentAnswerId ? '' : 'none';
  $('resultPanel').classList.remove('hidden');
}

// ---------- Task for Claude (execute instruction → post result to Jira) ----------
let taskEdited=false;
$('taskText').addEventListener('input', ()=>{ taskEdited=true; });
$('taskBtn').addEventListener('click', async ()=>{
  const km=$('key').value.toUpperCase().match(/([A-Z][A-Z0-9]+-\d+)/);
  const key=km?km[1]:'';
  if(!key){ $('taskStatus').textContent=t('repoErr'); return; }
  const task=$('taskText').value.trim();
  if(task.length<3){ $('taskStatus').textContent=t('taskEmpty'); return; }
  const btn=$('taskBtn'); btn.disabled=true; $('taskOut').innerHTML='';
  $('taskResult').innerHTML=''; $('taskLog').textContent=''; $('taskLog').classList.remove('hidden');
  $('taskStatus').innerHTML='<span class="spin"></span> …';
  const reportUrl = currentAnswerId ? `${location.origin}/testing?id=${currentAnswerId}` : undefined;
  let llm='';
  try{
    const res=await fetch('/api/testing/task/stream',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({key,task,lang:L,reportUrl})});
    if(!res.ok||!res.body){ const tx=await res.text().catch(()=>''); $('taskStatus').textContent='⚠️ '+(tx||t('taskErr')); return; }
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='', result=null;
    while(true){ const {value,done}=await reader.read(); if(done) break; buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop()||'';
      for(const block of parts){ const ev=(block.match(/^event: (.*)$/m)||[])[1]; const dm=block.match(/^data: (.*)$/m); if(!ev||!dm) continue; let d; try{d=JSON.parse(dm[1]);}catch(_){continue;}
        if(ev==='stage'){ $('taskStatus').innerHTML='<span class="spin"></span> '+esc(d.msg||''); }
        else if(ev==='delta'){ llm+=d.text||''; $('taskLog').textContent=llm; $('taskLog').scrollTop=$('taskLog').scrollHeight; }
        else if(ev==='result'){ result=d; }
        else if(ev==='error'){ $('taskStatus').textContent='⚠️ '+(d.message||t('taskErr')); }
      }
    }
    if(result){
      $('taskStatus').textContent=''; $('taskLog').classList.add('hidden');
      $('taskResult').innerHTML = renderMarkdown(result.result||'');
      if(result.commentUrl) $('taskOut').innerHTML=`<div class="chip">✅ ${esc(t('taskPosted'))}: <a href="${esc(result.commentUrl)}" target="_blank">${esc(result.key)}</a></div>`;
    }
  } catch(_){ $('taskStatus').textContent='⚠️ '+t('netErr'); }
  finally { btn.disabled=false; }
});

function renderResult(r){ displayReport(r.report, r.meta, r.key, null); saveAnswer(); }

function updateUrl(id){ try{ history.replaceState(null,'',location.pathname+'?id='+encodeURIComponent(id)); }catch(_){} }
async function saveAnswer(){
  try{
    const title=(reportMeta&&reportMeta.issue&&reportMeta.issue.summary)||reportKey;
    const r=await fetch('/api/answers',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({feature:'testing', ref:reportKey, title, data:{report:reportText, meta:reportMeta, key:reportKey}})});
    const d=await r.json(); if(r.ok&&d.id){ currentAnswerId=d.id; $('copyLinkBtn').style.display=''; updateUrl(d.id); }
  }catch(_){}
}
async function loadAnswer(id){
  try{
    const d=await fetch('/api/answers/'+id).then(r=>r.json());
    if(!d.answer){ return; }
    const a=d.answer.data||{};
    displayReport(a.report, a.meta, a.key||d.answer.ref, id);
    updateUrl(id); window.scrollTo({top:0,behavior:'smooth'});
  }catch(_){}
}

$('copyBtn').addEventListener('click', ()=>{ navigator.clipboard?.writeText(reportText); $('copyStatus').textContent=t('copied'); setTimeout(()=>$('copyStatus').textContent='',1500); });
$('copyLinkBtn').addEventListener('click', ()=>{ if(!currentAnswerId) return; navigator.clipboard?.writeText(location.origin+'/testing?id='+currentAnswerId); $('copyStatus').textContent=t('linkCopied'); setTimeout(()=>$('copyStatus').textContent='',1800); });
$('expandAllBtn').addEventListener('click', ()=> $('report').querySelectorAll('.block').forEach(b=>b.classList.remove('collapsed')));
$('collapseAllBtn').addEventListener('click', ()=> $('report').querySelectorAll('.block').forEach(b=>b.classList.add('collapsed')));

// ---------- history ----------
$('historyBtn').addEventListener('click', openHistory);
$('histClose').addEventListener('click', closeHistory);
$('histMask').addEventListener('click', closeHistory);
function openHistory(){ $('histMask').classList.add('open'); $('histDrawer').classList.add('open'); loadHistory(); }
function closeHistory(){ $('histMask').classList.remove('open'); $('histDrawer').classList.remove('open'); }
async function loadHistory(){
  $('histList').innerHTML='<p class="muted">…</p>';
  try{
    const d=await fetch('/api/answers?feature=testing').then(r=>r.json());
    if(!d.items||!d.items.length){ $('histList').innerHTML=`<p class="muted">${esc(t('historyEmpty'))}</p>`; return; }
    $('histList').innerHTML=d.items.map(it=>`<div class="hist-item" data-id="${esc(it.id)}">
      <div class="hist-top"><span class="hist-title">${esc(it.title||it.ref||t('untitled'))}</span><button class="hist-del" data-del="${esc(it.id)}">🗑</button></div>
      <div class="hist-meta">${esc(it.ref||'')} · ${new Date(it.createdAt).toLocaleString()}</div></div>`).join('');
    $('histList').querySelectorAll('.hist-item').forEach(el=> el.addEventListener('click', e=>{ if(e.target.closest('[data-del]'))return; loadAnswer(el.getAttribute('data-id')); closeHistory(); }));
    $('histList').querySelectorAll('[data-del]').forEach(b=> b.addEventListener('click', async e=>{ e.stopPropagation(); if(!confirm(t('confirmDel')))return; try{await fetch('/api/answers/'+b.getAttribute('data-del'),{method:'DELETE'});}catch(_){} loadHistory(); }));
  }catch(_){ $('histList').innerHTML=`<p class="muted">${esc(t('netErr'))}</p>`; }
}

(async ()=>{ await boot(); const sid=new URLSearchParams(location.search).get('id'); if(sid) loadAnswer(sid); })();
</script>
