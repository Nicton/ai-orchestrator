<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',Roboto,Arial,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  a { color:var(--blue); text-decoration:none; }
  button,input,select,textarea { font-family:inherit; }
  .wrap { max-width:1240px; margin:22px auto; padding:0 18px 80px; }
  h1 { font-size:22px; font-weight:600; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 20px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); margin-bottom:18px; }
  .panel > h3 { margin:0; padding:13px 18px; font-size:15px; border-bottom:1px solid var(--line); font-weight:600; display:flex; align-items:center; gap:8px; }
  .pad { padding:16px 18px; }
  label.fld { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.3px; color:var(--muted); margin:0 0 5px; }
  textarea, input[type=text], select { width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:var(--panel); color:var(--ink); }
  textarea { resize:vertical; line-height:1.5; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  button.pri { background:var(--blue); color:#fff; border:none; border-radius:8px; padding:11px 18px; font-size:14px; font-weight:500; cursor:pointer; }
  button.pri:hover { background:var(--blue-dark); } button.pri:disabled { opacity:.55; cursor:default; }
  button.go { background:var(--green,#1f9d57); } button.go:hover { filter:brightness(1.05); }
  button.ghost { border:1px solid var(--line); background:var(--panel); color:var(--ink); border-radius:8px; padding:10px 14px; font-size:14px; cursor:pointer; }
  button.ghost:hover { background:var(--bg-soft); }
  .muted { color:var(--muted); font-size:13px; }
  .err { color:var(--red); font-size:13px; margin-top:10px; min-height:16px; }
  .warn { color:#92560a; background:#fff3e0; border:1px solid #ffd9a8; border-radius:8px; padding:8px 12px; font-size:13px; margin-top:10px; }
  .rec-on { background:var(--red) !important; color:#fff !important; border-color:var(--red) !important; }
  .drop { border:2px dashed var(--line); border-radius:10px; padding:10px 14px; text-align:center; color:var(--muted); font-size:13px; cursor:pointer; }
  .imgrow { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .thumb { width:54px; height:54px; object-fit:cover; border-radius:6px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; }
  .filechip { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:8px; padding:5px 10px; font-size:13px; background:var(--bg-soft); }
  .hidden { display:none !important; }
  .repochecks { display:flex; flex-wrap:wrap; gap:6px 14px; padding:8px 0; }
  .repochecks label { display:inline-flex; align-items:center; gap:5px; font-size:13px; cursor:pointer; border:1px solid var(--line); border-radius:8px; padding:5px 10px; background:var(--panel); }
  .repochecks label:hover { background:var(--bg-soft); }
  .repochecks input { accent-color:var(--blue); }
  .split { display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start; }
  @media (max-width:900px){ .split { grid-template-columns:1fr; } }
  .col { display:flex; flex-direction:column; }
  .chat { display:flex; flex-direction:column; height:62vh; min-height:430px; }
  .msgs { flex:1; overflow:auto; padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
  .bubble { max-width:88%; padding:9px 12px; border-radius:12px; font-size:14px; line-height:1.5; white-space:pre-wrap; }
  .bubble.user { align-self:flex-end; background:var(--blue); color:#fff; border-bottom-right-radius:4px; }
  .bubble.bot { align-self:flex-start; background:var(--bg-soft); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .qchips { display:flex; flex-direction:column; gap:6px; margin-top:4px; }
  .qchip { text-align:left; border:1px dashed var(--line); background:var(--panel); color:var(--ink); border-radius:8px; padding:7px 10px; font-size:13px; cursor:pointer; }
  .qchip:hover { background:var(--bg-soft); border-style:solid; }
  .composer { border-top:1px solid var(--line); padding:10px 12px; display:flex; gap:8px; align-items:flex-end; }
  .composer textarea { flex:1; min-height:42px; max-height:140px; }
  .stagelog { font-size:12px; color:var(--muted); padding:0 16px 8px; min-height:16px; }
  .llmlog { white-space:pre-wrap; background:#0d1117; color:#c9d1d9; border-radius:8px; padding:10px; font-size:11px; line-height:1.45; max-height:160px; overflow:auto; margin:0 16px 10px; }
  .planbox { padding:16px 18px; max-height:48vh; overflow:auto; font-size:14px; line-height:1.55; }
  .planbox h1,.planbox h2,.planbox h3 { font-size:14px; text-transform:uppercase; letter-spacing:.3px; color:var(--blue); margin:14px 0 6px; }
  .planbox ul,.planbox ol { padding-left:22px; margin:6px 0; } .planbox li { margin:3px 0; }
  .planbox code { background:var(--bg-soft); border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-size:12.5px; }
  .planbox pre { background:#0d1117; color:#c9d1d9; border-radius:8px; padding:10px; overflow:auto; font-size:12px; }
  .badge { display:inline-block; padding:2px 9px; border-radius:9px; font-size:11px; font-weight:600; background:var(--bg-soft); border:1px solid var(--line); }
  .badge.ready { background:#e9f6ec; color:var(--green,#1f9d57); border-color:#bfe6cb; }
  .pipelog { font-family:ui-monospace,Consolas,monospace; font-size:12px; white-space:pre-wrap; background:#0d1117; color:#c9d1d9; border-radius:8px; padding:10px; max-height:240px; overflow:auto; margin-top:10px; }
  .mrbox { border:1px solid #ceead6; background:#e6f4ea; border-radius:10px; padding:14px 16px; font-size:14px; color:#14532d; margin-top:12px; }
  .fb { display:inline-flex; gap:8px; align-items:center; margin-top:10px; }
  .fb button { border:1px solid var(--line); background:var(--panel); border-radius:8px; padding:6px 12px; font-size:15px; cursor:pointer; }
  .fb button.sel { border-color:var(--blue); background:color-mix(in srgb, var(--blue) 12%, transparent); }
  .pillrow { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--blue); border-radius:50%; animation:sp .8s linear infinite; vertical-align:-2px; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .topbar { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .drawer-mask { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:60; display:none; } .drawer-mask.open { display:block; }
  .drawer { position:fixed; top:0; right:0; height:100%; width:min(440px,92vw); background:var(--panel); border-left:1px solid var(--line); box-shadow:-8px 0 24px rgba(0,0,0,.18); z-index:61; transform:translateX(100%); transition:transform .2s ease; display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); }
  .drawer h3 { margin:0; padding:14px 18px; border-bottom:1px solid var(--line); font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .drawer .list { flex:1; overflow:auto; padding:12px 14px; }

  .hist-title { font-size:14px; font-weight:500; }

  .st { display:inline-block; padding:1px 8px; border-radius:9px; font-size:11px; font-weight:600; background:var(--bg-soft); border:1px solid var(--line); color:var(--muted); }

  .hist-del { border:none; background:none; color:var(--muted); cursor:pointer; font-size:13px; } .hist-del:hover { color:var(--red); }

<script>
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
// minimal markdown → html for the plan / summary
function md(src){
  let s = esc(String(src||''));
  s = s.replace(/```([\s\S]*?)```/g, (m,c)=>`<pre>${c.replace(/^\n/,'')}</pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  const lines = s.split('\n'); let out=[], inUl=false, inOl=false;
  const closeLists=()=>{ if(inUl){out.push('</ul>');inUl=false;} if(inOl){out.push('</ol>');inOl=false;} };
  for(let ln of lines){
    let m;
    if(/^\s*###?\s+/.test(ln)){ closeLists(); out.push('<h3>'+ln.replace(/^\s*#+\s+/,'')+'</h3>'); }
    else if((m=ln.match(/^\s*[-*]\s+(.*)/))){ if(!inUl){closeLists();out.push('<ul>');inUl=true;} out.push('<li>'+m[1]+'</li>'); }
    else if((m=ln.match(/^\s*\d+[.)]\s+(.*)/))){ if(!inOl){closeLists();out.push('<ol>');inOl=true;} out.push('<li>'+m[1]+'</li>'); }
    else if(ln.trim()===''){ closeLists(); }
    else { closeLists(); out.push('<p style="margin:6px 0">'+ln+'</p>'); }
  }
  closeLists(); return out.join('');
}

    editPlan:'✏️ Modifier le plan avant lancement', reviewLabel:'🔍 Auto-revue', gateFailedMsg:'❌ Build gate échoué — MR marquée [BUILD FAILED], correction nécessaire', gateLimitedMsg:'⚠️ Build gate limité (dépendances du dépôt non installées sur le serveur)',
    recognizing:'Transcription…', analyzing:'analyse…', running:'pipeline en cours…',
    descShort:'Décrivez la tâche plus en détail', noRepo:'Choisissez un dépôt', noMic:'Pas de micro', netErr:'Réseau indisponible', recovering:'Connexion interrompue — récupération du résultat…',
    fileBig:'Fichier > 30 Mo', imgBig:'Image > 10 Mo', uploadErr:'Échec du téléversement',
    analyzeErr:'Erreur d’analyse', runErr:'Erreur de pipeline', thinking:'…', done:'Terminé.',
    history:'🕘 Historique', historyTitle:'Historique', historyEmpty:'Rien pour le moment.', untitled:'Sans titre',
    confirmDel:'Supprimer ?', turns:'échanges', copyLink:'🔗 Lien', linkCopied:'Copié', mrOpened:'Merge request ouverte', noChanges:'Aucun changement', committedLocal:'Changements commités localement (push sauté).', thanks:'Merci pour le retour !',
  },
};
function t(k){ return (I18N[L]&&I18N[L][k]) || I18N.en[k] || k; }
function applyLang(){
  document.title=t('title');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.getAttribute('data-i18n')); });
  $('desc').placeholder=t('descPh'); $('answer').placeholder=t('answerPh');
  $('recBtn').textContent=t('recStart'); $('analyzeBtn').textContent=t('analyze'); $('backBtn').textContent=t('back');
  $('sendBtn').textContent=t('send'); $('runBtn').textContent=t('run'); $('copyLinkBtn').textContent=t('copyLink');
  $('historyBtn').textContent=t('history'); $('followBtn').textContent=t('follow');
}

let me=null, cfg={repos:[],canPush:false};
let images=[], files=[], messages=[], visionText='';
let runId=null, planText='', titleText='', keysArr=[], reposSel=[], ready=false, phase='plan', busy=false;
function checkedRepos(){ return [...document.querySelectorAll('#repoBox input:checked')].map(i=>i.value); }
function setRepoChecks(list){ const set=new Set(list||[]); document.querySelectorAll('#repoBox input').forEach(i=>{ i.checked=set.has(i.value); }); }
let mediaRec=null, recChunks=[], recTarget='desc';

async function boot(){
  applyLang();
  const r = await fetch('/api/auth/me'); if(!r.ok){ location.href='/login'; return; }
  me=(await r.json()).user;
  $('authorNote').textContent=t('author')+(me.name||me.email||'');
  cfg = await fetch('/api/develop/config').then(r=>r.json()).catch(()=>({repos:[],canPush:false}));
  $('repoBox').innerHTML = (cfg.repos||[]).map(x=>`<label><input type="checkbox" value="${esc(x)}"> ${esc(x)}</label>`).join('') || '<span class="muted">нет доступных репозиториев</span>';
  if(!cfg.canPush) $('pushWarn').style.display='';
}

// attachments
$('imgDrop').addEventListener('click', ()=>$('imgInput').click());
$('fileDrop').addEventListener('click', ()=>$('fileInput').click());
$('imgInput').addEventListener('change', e=>{ for(const f of e.target.files) uploadImage(f); e.target.value=''; });
$('fileInput').addEventListener('change', e=>{ for(const f of e.target.files) uploadFile(f); e.target.value=''; });
window.addEventListener('paste', e=>{ for(const it of (e.clipboardData?.items||[])) if(it.type.startsWith('image/')){ const f=it.getAsFile(); if(f) uploadImage(f); } });
async function uploadImage(file){
  if(file.size>10*1024*1024){ $('inErr').textContent=t('imgBig'); return; }
  const fd=new FormData(); fd.append('image',file);
  try{ const r=await fetch('/api/knowledge/upload-image',{method:'POST',body:fd}); const d=await r.json();
    if(!r.ok){ $('inErr').textContent=d.error||t('uploadErr'); return; }
    images.push(d.key); $('thumbs').insertAdjacentHTML('beforeend',`<img class="thumb" src="${URL.createObjectURL(file)}" title="${esc(file.name)}" />`);
  }catch(_){ $('inErr').textContent=t('netErr'); }
}
async function uploadFile(file){
  if(file.size>30*1024*1024){ $('inErr').textContent=t('fileBig'); return; }
  if(files.length>=20){ return; }
  const fd=new FormData(); fd.append('file',file);
  const chip=document.createElement('span'); chip.className='filechip'; chip.innerHTML=`<span class="spin"></span> ${esc(file.name)}`; $('filechips').appendChild(chip);
  try{ const r=await fetch('/api/develop/upload-file',{method:'POST',body:fd}); const d=await r.json();
    if(!r.ok){ chip.remove(); $('inErr').textContent=d.error||t('uploadErr'); return; }
    files.push({key:d.key,name:d.name||file.name}); chip.innerHTML=`📎 ${esc(d.name||file.name)}`;
  }catch(_){ chip.remove(); $('inErr').textContent=t('netErr'); }
}

// voice
function wireVoice(btnId,target){
  $(btnId).addEventListener('click', async ()=>{
    if(mediaRec && mediaRec.state==='recording'){ mediaRec.stop(); return; }
    try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); recTarget=target; mediaRec=new MediaRecorder(stream); recChunks=[];
      mediaRec.ondataavailable=e=>{ if(e.data.size) recChunks.push(e.data); };
      mediaRec.onstop=async ()=>{ stream.getTracks().forEach(x=>x.stop()); $(btnId).classList.remove('rec-on'); $(btnId).textContent=btnId==='recBtn'?t('recStart'):'🎙️';
        const statusEl=recTarget==='desc'?$('analyzeStatus'):$('stageLog'); statusEl.textContent=t('recognizing');
        const blob=new Blob(recChunks,{type:'audio/webm'}); const fd=new FormData(); fd.append('audio',blob,'voice.webm');
        try{ const r=await fetch('/api/develop/transcribe',{method:'POST',body:fd}); const d=await r.json(); statusEl.textContent='';
          if(!r.ok){ ( recTarget==='desc'?$('inErr'):$('runErr') ).textContent=d.error||t('netErr'); return; }
          const box=recTarget==='desc'?$('desc'):$('answer'); box.value=(box.value?box.value+'\n':'')+(d.text||''); if(recTarget==='answer') autoGrow(box);
        }catch(_){ statusEl.textContent=''; }
      };
      mediaRec.start(); $(btnId).classList.add('rec-on'); $(btnId).textContent=btnId==='recBtn'?t('recStop'):'⏹';
    }catch(_){ $('inErr').textContent=t('noMic'); }
  });
}
wireVoice('recBtn','desc'); wireVoice('chatRecBtn','answer');

// start
$('analyzeBtn').addEventListener('click', ()=>{
  $('inErr').textContent='';
  const desc=$('desc').value.trim(); if(desc.length<5){ $('inErr').textContent=t('descShort'); return; }
  keysArr = ($('keys').value.toUpperCase().match(/[A-Z][A-Z0-9]+-\d+/g)||[]);
  reposSel = checkedRepos();
  runId=null; planText=''; ready=false; phase='plan';
  let brief = (keysArr.length?`Jira: ${keysArr.join(', ')}\n`:'') + desc + (files.length?`\n\n(Files: ${files.map(f=>f.name).join(', ')})`:'');
  messages=[{role:'user',content:brief}];
  $('inputScreen').classList.add('hidden'); $('workScreen').classList.remove('hidden');
  $('msgs').innerHTML=''; $('mrOut').innerHTML=''; $('pipeLog').classList.add('hidden'); $('fbBox').classList.add('hidden'); $('followBox').classList.add('hidden');
  addBubble('user', desc);
  runChat();
});
$('backBtn').addEventListener('click', ()=>{ $('workScreen').classList.add('hidden'); $('inputScreen').classList.remove('hidden'); });

function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
$('answer').addEventListener('input', e=>autoGrow(e.target));
$('answer').addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendAnswer(); } });
$('sendBtn').addEventListener('click', sendAnswer);
function sendAnswer(){ if(busy) return; const a=$('answer').value.trim(); if(!a) return; messages.push({role:'user',content:a}); addBubble('user',a); $('answer').value=''; autoGrow($('answer')); runChat(); }

function addBubble(role,text){ const d=document.createElement('div'); d.className='bubble '+(role==='user'?'user':'bot'); d.textContent=text; $('msgs').appendChild(d); $('msgs').scrollTop=$('msgs').scrollHeight; return d; }
function addQuestions(qs){ if(!qs||!qs.length) return; const wrap=document.createElement('div'); wrap.className='qchips';
  qs.forEach(q=>{ const b=document.createElement('button'); b.className='qchip'; b.textContent='❓ '+q; b.addEventListener('click',()=>{ $('answer').value=q+'\n'; $('answer').focus(); autoGrow($('answer')); }); wrap.appendChild(b); });
  $('msgs').appendChild(wrap); $('msgs').scrollTop=$('msgs').scrollHeight; }

async function runChat(){
  busy=true; $('sendBtn').disabled=true; $('analyzeStatus').textContent='';
  $('stageLog').innerHTML='<span class="spin"></span> '+t('analyzing'); $('llmLog').textContent=''; let llmBuf='';
  const thinking=addBubble('bot', t('thinking'));
  try{
    const res=await fetch('/api/develop/chat/stream',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({ messages, keys:keysArr, repos:checkedRepos(), images, files:files.map(f=>f.key), fileNames:files.map(f=>f.name), visionText:visionText||undefined, lang:L })});
    if(!res.ok||!res.body){ const tx=await res.text().catch(()=>''); thinking.textContent='⚠️ '+(tx||t('analyzeErr')); throw new Error('http'); }
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='', result=null;
    while(true){ const {value,done}=await reader.read(); if(done) break; buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop()||'';
      for(const block of parts){ const ev=(block.match(/^event: (.*)$/m)||[])[1]; const dm=block.match(/^data: (.*)$/m); if(!ev||!dm) continue; let data; try{data=JSON.parse(dm[1]);}catch(_){continue;}
        if(ev==='stage'){ $('stageLog').innerHTML='<span class="spin"></span> '+esc(data.msg||''); }
        else if(ev==='delta'){ llmBuf+=data.text||''; $('llmLog').classList.remove('hidden'); $('llmLog').textContent=llmBuf; $('llmLog').scrollTop=$('llmLog').scrollHeight; }
        else if(ev==='result'){ result=data; }
        else if(ev==='error'){ thinking.textContent='⚠️ '+(data.message||t('analyzeErr')); }
      }
    }
    if(result){
      if(result.visionText) visionText=result.visionText;
      thinking.textContent=result.reply||t('done');
      messages.push({role:'assistant',content:result.reply||''});
      addQuestions(result.questions);
      planText=result.plan||planText; titleText=result.title||titleText; ready=!!result.ready;
      if(Array.isArray(result.repos) && result.repos.length){ reposSel=result.repos.filter(x=>(cfg.repos||[]).includes(x)); setRepoChecks(reposSel); }
      if(Array.isArray(result.keys)&&result.keys.length) keysArr=result.keys;
      renderPlan();
      saveRun();
    }
  }catch(_){ if(thinking.textContent===t('thinking')) thinking.textContent='⚠️ '+t('netErr'); }
  finally{ busy=false; $('sendBtn').disabled=false; $('stageLog').textContent=''; }
}

function renderPlan(){
  $('planRender').innerHTML = planText ? md(planText) : `<p class="muted">${esc(t('planPlaceholder'))}</p>`;
  if($('planEdit') && document.activeElement!==$('planEdit')) $('planEdit').value = planText;
  $('readyBadge').innerHTML = ready ? `<span class="badge ready">${esc(t('ready'))}</span>` : `<span class="badge">${esc(t('draft'))}</span>`;
}
$('planEdit').addEventListener('input', e=>{ planText=e.target.value; $('planRender').innerHTML=planText?md(planText):''; });

async function saveRun(){
  try{ const body={ id:runId||undefined, title:titleText||'', keys:keysArr, repos:reposSel, plan:planText||undefined, messages, images, files:files.map(f=>({key:f.key,name:f.name})), visionText:visionText||undefined, lang:L };
    const r=await fetch('/api/develop/save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)}); const d=await r.json();
    if(r.ok&&d.id){ runId=d.id; $('copyLinkBtn').style.display=''; try{ history.replaceState(null,'',location.pathname+'?id='+encodeURIComponent(runId)); }catch(_){} }
  }catch(_){}
}
$('copyLinkBtn').addEventListener('click', ()=>{ if(!runId) return; navigator.clipboard?.writeText(location.origin+'/develop?id='+runId); $('runStatus').textContent=t('linkCopied'); setTimeout(()=>$('runStatus').textContent='',1800); });

// run pipeline
$('runBtn').addEventListener('click', ()=>startRun(''));
$('followBtn').addEventListener('click', ()=>{ const ins=$('followInput').value.trim(); if(!ins) return; $('followInput').value=''; startRun(ins); });
async function startRun(instruction){
  if(busy) return; $('runErr').textContent='';
  reposSel = checkedRepos();
  if(!reposSel.length){ $('runErr').textContent=t('noRepo'); return; }
  await saveRun(); if(!runId){ $('runErr').textContent=t('netErr'); return; }
  busy=true; $('runBtn').disabled=true; $('followBtn').disabled=true; $('fbBox').classList.add('hidden');
  $('runStatus').innerHTML='<span class="spin"></span> '+t('running');
  $('pipeLog').classList.remove('hidden'); $('pipeLog').textContent=''; let plog='';
  try{
    const res=await fetch('/api/develop/run/stream',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({ id:runId, instruction:instruction||undefined })});
    if(!res.ok||!res.body){ const tx=await res.text().catch(()=>''); $('runErr').textContent=tx||t('runErr'); return; }
    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='', result=null, gotError=false;
    while(true){ const {value,done}=await reader.read(); if(done) break; buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n'); buf=parts.pop()||'';
      for(const block of parts){ const ev=(block.match(/^event: (.*)$/m)||[])[1]; const dm=block.match(/^data: (.*)$/m); if(!ev||!dm) continue; let data; try{data=JSON.parse(dm[1]);}catch(_){continue;}
        if(ev==='stage'){ plog+=(data.msg||'')+'\n'; $('pipeLog').textContent=plog; $('pipeLog').scrollTop=$('pipeLog').scrollHeight; }
        else if(ev==='result'){ result=data; }
        else if(ev==='error'){ gotError=true; $('runErr').textContent=data.message||t('runErr'); }
      }
    }
    if(result) renderRunResult(result);
    else if(!gotError) await recoverRun(); // connection dropped mid-run → pipeline still runs on server
  }catch(_){ await recoverRun(); }
  finally{ busy=false; $('runBtn').disabled=false; $('followBtn').disabled=false; $('runStatus').textContent=''; }
}
function renderRunResult(result){
  phase='done';
  const mrs = result.mrUrls||[]; const reslist = result.results||[];
  let html='';
  if(mrs.length){ html=`<div class="mrbox">✅ ${esc(t('mrOpened'))}:<br>${mrs.map(m=>`• <b>${esc(m.repo||'')}</b>: <a href="${esc(m.mrUrl)}" target="_blank">${esc(m.mrUrl)}</a>`).join('<br>')}<br><span class="muted">${esc(result.branch||'')}</span></div>`; }
  else { html=`<div class="warn">${esc(t('committedLocal'))} (${esc(result.branch||'')})</div>`; }
  if(reslist.some(r=>r.note==='build-failed'||r.gateOk===false)){ html+=`<div class="warn">${esc(t('gateFailedMsg'))}</div>`; }
  else if(reslist.some(r=>r.gateOk===null)){ html+=`<div class="warn">${esc(t('gateLimitedMsg'))}</div>`; }
  const reviews = reslist.filter(r=>r.reviewText).map(r=>`**${r.repo}** ${r.reviewText}`).join('\n\n');
  if(reviews){ html+=`<div style="margin-top:10px"><label class="fld">${esc(t('reviewLabel'))}</label><div class="planbox" style="max-height:22vh">${md(reviews)}</div></div>`; }
  html += `<div class="planbox" style="max-height:36vh">${md(result.summary||'')}</div>`;
  $('mrOut').innerHTML=html;
  $('fbBox').classList.remove('hidden'); $('followBox').classList.remove('hidden');
  addBubble('bot', (result.summary||t('done')) + (mrs.length?`\n\nMR: ${mrs.map(m=>m.mrUrl).join(' · ')}`:''));
}
// Recovery: the run/stream connection dropped but the backend pipeline keeps running and
// persists its log + final result to the DevRun. Poll until terminal, showing live progress.
async function recoverRun(){
  if(!runId){ if(!$('runErr').textContent) $('runErr').textContent=t('netErr'); return false; }
  $('runErr').textContent=''; $('runStatus').innerHTML='<span class="spin"></span> '+t('recovering');
  const terminal=['MR_OPEN','PUSHED','PLANNED','ERROR','DONE'];
  for(let i=0;i<360;i++){ // ~30 min @5s
    await new Promise(r=>setTimeout(r,5000));
    let r=null; try{ const d=await fetch('/api/develop/run/'+runId).then(x=>x.json()); r=d.run; }catch(_){ continue; }
    if(!r) continue;
    if(Array.isArray(r.log)&&r.log.length){ $('pipeLog').classList.remove('hidden'); $('pipeLog').textContent=r.log.join('\n'); $('pipeLog').scrollTop=$('pipeLog').scrollHeight; }
    if(terminal.includes(r.status)){
      const mrs=Array.isArray(r.mrUrls)?r.mrUrls:(r.mrUrl?[{repo:(reposSel[0]||''),mrUrl:r.mrUrl}]:[]);
      const lastBot=[...(Array.isArray(r.messages)?r.messages:[])].reverse().find(m=>m.role==='assistant');
      renderRunResult({ mrUrls:mrs, branch:r.branch, summary:lastBot?lastBot.content:t('done'), results:[] });
      if(r.status==='ERROR'&&!mrs.length) $('runErr').textContent=t('runErr');
      return true;
    }
  }
  if(!$('runErr').textContent) $('runErr').textContent=t('netErr');
  return false;
}

// feedback
function sendFb(rating, btn){ if(!runId) return; $('fbUp').classList.remove('sel'); $('fbDown').classList.remove('sel'); btn.classList.add('sel');
  fetch('/api/develop/feedback',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({ id:runId, rating })}).then(()=>{ $('runStatus').textContent=t('thanks'); setTimeout(()=>$('runStatus').textContent='',1800); }).catch(()=>{}); }
$('fbUp').addEventListener('click', ()=>sendFb(1,$('fbUp')));
$('fbDown').addEventListener('click', ()=>sendFb(-1,$('fbDown')));

// history
$('historyBtn').addEventListener('click', openHistory);
$('histClose').addEventListener('click', closeHistory);
$('histMask').addEventListener('click', closeHistory);
function openHistory(){ $('histMask').classList.add('open'); $('histDrawer').classList.add('open'); loadHistory(); }
function closeHistory(){ $('histMask').classList.remove('open'); $('histDrawer').classList.remove('open'); }
async function loadHistory(){
  $('histList').innerHTML='<p class="muted">…</p>';
  try{ const d=await fetch('/api/develop/history').then(r=>r.json());
    if(!d.items||!d.items.length){ $('histList').innerHTML=`<p class="muted">${esc(t('historyEmpty'))}</p>`; return; }
    $('histList').innerHTML=d.items.map(it=>{
      const when=new Date(it.updatedAt).toLocaleString();
      const st = it.mrUrl?`<span class="st mr">MR</span>`:`<span class="st">${esc(it.status||'')}</span>`;
      const rate = it.rating===1?'👍':(it.rating===-1?'👎':'');
      return `<div class="hist-item" data-id="${esc(it.id)}"><div class="hist-top"><span class="hist-title">${esc(it.title||t('untitled'))}</span><button class="hist-del" data-del="${esc(it.id)}">🗑</button></div>
        <div class="hist-meta">${st} · ${esc((it.keys||[]).join(', '))} · ${esc((it.repos||[]).join(', '))} · ${it.turns} ${esc(t('turns'))} ${rate} · ${esc(when)}</div></div>`;
    }).join('');
    $('histList').querySelectorAll('.hist-item').forEach(el=>{ el.addEventListener('click', e=>{ if(e.target.closest('[data-del]')) return; resumeRun(el.getAttribute('data-id')); }); });
    $('histList').querySelectorAll('[data-del]').forEach(b=>{ b.addEventListener('click', async e=>{ e.stopPropagation(); if(!confirm(t('confirmDel'))) return; try{ await fetch('/api/develop/run/'+b.getAttribute('data-del'),{method:'DELETE'}); }catch(_){} loadHistory(); }); });
  }catch(_){ $('histList').innerHTML=`<p class="muted">${esc(t('netErr'))}</p>`; }
}
async function resumeRun(id){
  try{ const d=await fetch('/api/develop/run/'+id).then(r=>r.json()); if(!d.run) return; const r=d.run;
    runId=r.id; $('copyLinkBtn').style.display='';
    messages=Array.isArray(r.messages)?r.messages:[]; visionText=r.visionText||''; images=Array.isArray(r.images)?r.images:[]; files=Array.isArray(r.files)?r.files:[];
    keysArr=r.keys||[]; reposSel=(r.repos&&r.repos.length?r.repos:(r.repo?[r.repo]:[])); planText=r.plan||''; titleText=r.title||''; ready=true;
    $('keys').value=keysArr.join(', '); setRepoChecks(reposSel);
    $('msgs').innerHTML=''; messages.forEach(m=>addBubble(m.role==='user'?'user':'bot', m.content));
    $('filechips').innerHTML=files.map(f=>`<span class="filechip">📎 ${esc(f.name)}</span>`).join('');
    $('thumbs').innerHTML=images.map(()=>`<div class="thumb">🖼</div>`).join('');
    renderPlan();
    const mrs=Array.isArray(r.mrUrls)?r.mrUrls:(r.mrUrl?[{repo:(reposSel[0]||''),mrUrl:r.mrUrl}]:[]);
    $('mrOut').innerHTML = mrs.length?`<div class="mrbox">✅ ${esc(t('mrOpened'))}:<br>${mrs.map(m=>`• <b>${esc(m.repo||'')}</b>: <a href="${esc(m.mrUrl)}" target="_blank">${esc(m.mrUrl)}</a>`).join('<br>')} <span class="muted">${esc(r.branch||'')}</span></div>`:'';
    if(mrs.length||r.status==='PUSHED'){ $('followBox').classList.remove('hidden'); $('fbBox').classList.remove('hidden'); }
    $('runErr').textContent=''; $('pipeLog').classList.add('hidden');
    closeHistory(); $('inputScreen').classList.add('hidden'); $('workScreen').classList.remove('hidden');
  }catch(_){}
}

(async ()=>{ await boot(); const sid=new URLSearchParams(location.search).get('id'); if(sid) resumeRun(sid); })();
</script>
