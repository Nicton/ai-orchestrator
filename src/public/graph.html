<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Knowledge Graph — Searchify</title>
<style>
  :root { --bg:#f6f8fc; --panel:#fff; --ink:#202124; --muted:#5f6368; --line:#e3e6ea; --blue:#1a73e8; --shadow:0 1px 4px rgba(32,33,36,.12); }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Segoe UI',Roboto,Arial,system-ui,sans-serif; background:var(--bg); color:var(--ink); }
  a { color:var(--blue); text-decoration:none; }
  button,select,input { font-family:inherit; }
  header.bar { background:var(--panel); border-bottom:1px solid var(--line); padding:10px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header.bar .title { font-size:17px; font-weight:600; }
  header.bar .spacer { flex:1; }
  .ghost { border:1px solid var(--line); background:#fff; color:#3c4043; padding:7px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
  .ghost.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  input.search { border:1px solid var(--line); border-radius:8px; padding:7px 11px; font-size:13px; width:220px; }
  select { border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:13px; }
  .wrap { display:flex; height:calc(100vh - 53px); }
  .canvas { flex:1; position:relative; overflow:hidden; background:radial-gradient(circle at 50% 40%, #fff, #eef1f6); }
  svg { width:100%; height:100%; display:block; cursor:grab; }
  svg.drag { cursor:grabbing; }
  .edge { stroke:#cdd4de; stroke-width:1; }
  .edge.cross { stroke:#f439a0; stroke-width:1.4; opacity:.55; }
  .edge.hl { stroke:var(--blue); stroke-width:2.2; opacity:1; }
  .node circle { cursor:pointer; stroke:#fff; stroke-width:1.5; }
  .node text { font-size:10px; fill:#3c4043; pointer-events:none; }
  .node.dim { opacity:.12; }
  .node.risk circle { stroke:#d93025; stroke-width:3; }
  .side { width:340px; border-left:1px solid var(--line); background:var(--panel); padding:16px; overflow-y:auto; }
  .side h2 { font-size:15px; margin:0 0 4px; }
  .muted { color:var(--muted); font-size:13px; }
  .layers { display:flex; flex-wrap:wrap; gap:6px; }
  .chip { display:flex; align-items:center; gap:5px; font-size:12px; padding:4px 9px; border:1px solid var(--line); border-radius:20px; cursor:pointer; user-select:none; background:#fff; }
  .chip.off { opacity:.4; }
  .dot { width:11px; height:11px; border-radius:50%; display:inline-block; }
  .rel { border-left:3px solid var(--blue); padding:5px 9px; margin:5px 0; background:#f3f8ff; border-radius:0 6px 6px 0; font-size:12.5px; }
  .stat { display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; border-bottom:1px dashed var(--line); }
  .empty { padding:60px 20px; text-align:center; color:var(--muted); }
  .pill { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; background:#eef1f5; color:#5f6368; }
  .hint { position:absolute; bottom:10px; left:12px; font-size:11px; color:#9aa0a6; background:rgba(255,255,255,.7); padding:3px 8px; border-radius:6px; }
</style>
</head>
<body>
<header class="bar">
  <span class="title">Searchify Graph</span>
  <input class="search" id="search" placeholder="Найти узел…" autocomplete="off" />
  <select id="domain"><option value="">Все домены</option></select>
  <span class="layers" id="layers"></span>
  <button class="ghost" id="risksBtn">⚠ Риски</button>
  <span class="spacer"></span>
  <span class="muted" id="counts"></span>
  <a class="ghost" href="/">← Поиск</a>
</header>
<div class="wrap">
  <div class="canvas" id="canvas">
    <div class="empty" id="msg">Загрузка графа…</div>
    <div class="hint">Колесо — зум · тяни фон — сдвиг · клик по узлу — связи</div>
  </div>
  <div class="side" id="side">
    <h2>Граф знаний проекта</h2>
    <div class="muted">Глубина изученности: модули → фичи → экраны/модалки → доки → код. Размер узла = охват/глубина, цвет = тип/статус. Розовые рёбра — кросс-модульные связи.</div>
    <div id="stats" style="margin-top:12px"></div>
    <div id="detail"></div>
  </div>
</div>
<script>
const TYPE = {
  module:      { color:'#34a853', label:'Модули',   on:true  },
  feature:     { color:'#1a73e8', label:'Фичи',     on:true  },
  modal:       { color:'#a142f4', label:'Модалки',  on:true  },
  screen:      { color:'#e37400', label:'Экраны',   on:false },
  document:    { color:'#5f6368', label:'Доки',     on:false },
  code_file:   { color:'#94a3b8', label:'Код',      on:false },
  requirement: { color:'#d93025', label:'Требования', on:false },
  confluence:  { color:'#12b5cb', label:'Confluence', on:false },
};
const STATUS_TINT = { implemented:null, partial:'#f9ab00', 'not-implemented':'#d93025', icebox:'#9aa0a6' };
function colorFor(n){
  if (n.type==='document' && n.status && STATUS_TINT[n.status]) return STATUS_TINT[n.status];
  return (TYPE[n.type]||{}).color || '#7b8794';
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let NODES=[], EDGES=[], BYID={}, pos={}, deg={}, domains={};
let view={x:0,y:0,k:1}, W=0, H=0, sel=null, risksOn=false;

async function boot(){
  const me = await fetch('/api/auth/me'); if(!me.ok){ location.href='/login'; return; }
  const data = await fetch('/api/knowledge/graph').then(r=>r.json());
  NODES = data.nodes||[]; EDGES = data.edges||[];
  if(!NODES.length){ document.getElementById('msg').innerHTML='Граф пуст. Запустите загрузку graph.json.'; return; }
  BYID = {}; NODES.forEach(n=>BYID[n.id]=n);
  deg = {}; EDGES.forEach(e=>{ deg[e.from]=(deg[e.from]||0)+1; deg[e.to]=(deg[e.to]||0)+1; });
  // domain span per feature (cross-module breadth) for depth sizing
  computeFeatureSpan();
  buildControls();
  relayout();
}

// how many distinct domains each feature/modal touches (via connected docs)
let span={};
function computeFeatureSpan(){
  const acc={};
  EDGES.forEach(e=>{
    const a=BYID[e.from], b=BYID[e.to]; if(!a||!b) return;
    const feat = a.type==='feature'||a.type==='modal' ? a : (b.type==='feature'||b.type==='modal'? b : null);
    const doc  = a.type==='document'? a : (b.type==='document'? b : null);
    if(feat&&doc&&doc.domain){ (acc[feat.id]=acc[feat.id]||new Set()).add(doc.domain); }
  });
  span={}; for(const k in acc) span[k]=acc[k].size;
}

function buildControls(){
  const L=document.getElementById('layers');
  L.innerHTML = Object.entries(TYPE).map(([t,c])=>
    `<span class="chip ${c.on?'':'off'}" data-t="${t}"><span class="dot" style="background:${c.color}"></span>${c.label}</span>`).join('');
  L.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
    TYPE[ch.dataset.t].on=!TYPE[ch.dataset.t].on; ch.classList.toggle('off'); relayout();
  }));
  const dom=document.getElementById('domain');
  const ds=Array.from(new Set(NODES.map(n=>n.domain).filter(Boolean))).sort();
  ds.forEach(d=>{ const o=document.createElement('option'); o.value=d; o.textContent=d; dom.appendChild(o); });
  dom.addEventListener('change',relayout);
  document.getElementById('risksBtn').addEventListener('click',()=>{ risksOn=!risksOn; document.getElementById('risksBtn').classList.toggle('active',risksOn); draw(); renderStats(); });
  const s=document.getElementById('search');
  s.addEventListener('input',()=>doSearch(s.value.trim().toLowerCase()));
}

function visible(){
  const dom=document.getElementById('domain').value;
  const nodes = NODES.filter(n=>{
    const t = TYPE[n.type]; if(!t||!t.on) return false;
    if(dom && (n.type==='document'||n.type==='feature'||n.type==='modal'||n.type==='screen') && n.domain && n.domain!==dom) return false;
    if(dom && n.type==='module' && n.id!==dom) return false;
    return true;
  });
  const ids=new Set(nodes.map(n=>n.id));
  const edges = EDGES.filter(e=>ids.has(e.from)&&ids.has(e.to));
  return {nodes,edges,ids};
}

// Cluster layout: modules anchored on a circle; each node placed near the
// modules it connects to (cross-module features land between modules).
function relayout(){
  const c=document.getElementById('canvas'); W=c.clientWidth; H=c.clientHeight;
  const {nodes,edges} = visible();
  const mods = nodes.filter(n=>n.type==='module');
  const cx=W/2, cy=H/2, R=Math.max(160, Math.min(cx,cy)-80);
  const anchor={};
  mods.forEach((m,i)=>{ const a=(i/Math.max(1,mods.length))*Math.PI*2-Math.PI/2; anchor[m.id]={x:cx+R*Math.cos(a),y:cy+R*Math.sin(a)}; pos[m.id]=anchor[m.id]; });
  // map node -> connected module anchors
  const modOf={};
  edges.forEach(e=>{
    const am=anchor[e.from], bm=anchor[e.to];
    if(am){ (modOf[e.to]=modOf[e.to]||[]).push(am); }
    if(bm){ (modOf[e.from]=modOf[e.from]||[]).push(bm); }
  });
  let orphan=0;
  nodes.forEach((n,i)=>{
    if(n.type==='module') return;
    const ms=modOf[n.id];
    if(ms&&ms.length){
      let x=0,y=0; ms.forEach(p=>{x+=p.x;y+=p.y;}); x/=ms.length; y/=ms.length;
      const j=(i%12)/12*Math.PI*2, rr=26+(i%5)*12;
      pos[n.id]={x:x+rr*Math.cos(j)+(ms.length>1?0:0), y:y+rr*Math.sin(j)};
    } else {
      const a=(orphan++/Math.max(1,nodes.length))*Math.PI*2; pos[n.id]={x:cx+(R+90)*Math.cos(a), y:cy+(R+90)*Math.sin(a)};
    }
  });
  view={x:0,y:0,k:1}; sel=null;
  draw(); renderStats();
}

function radius(n){
  if(n.type==='module') return 9+Math.min(16,(deg[n.id]||0)*0.6);
  if(n.type==='feature'||n.type==='modal') return 6+Math.min(14,(span[n.id]||1)*1.6); // breadth = cross-module depth
  if(n.type==='document') return 5+Math.min(12,(n.codeRefs||0)*1.4);                  // depth = code coverage
  return 4+Math.min(8,(deg[n.id]||0)*0.5);
}
function isRisk(n){
  if(n.type==='document' && (n.status==='not-implemented'||n.status==='icebox'||n.status==='partial')) return true;
  if((deg[n.id]||0)===0) return true;
  return false;
}

function draw(){
  const {nodes,edges}=visible();
  const conn=new Set();
  if(sel){ edges.forEach(e=>{ if(e.from===sel||e.to===sel){conn.add(e.from);conn.add(e.to);} }); }
  const T=`translate(${view.x},${view.y}) scale(${view.k})`;
  const edgeSvg=edges.map(e=>{
    const a=pos[e.from], b=pos[e.to]; if(!a||!b) return '';
    const cross = e.type==='mentions';
    const hl = sel&&(e.from===sel||e.to===sel);
    return `<line class="edge ${cross?'cross':''} ${hl?'hl':''}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"/>`;
  }).join('');
  const nodeSvg=nodes.map(n=>{
    const p=pos[n.id]; if(!p) return '';
    const dim=sel&&n.id!==sel&&!conn.has(n.id);
    const r=radius(n);
    const showLabel = n.type==='module' || r>9 || (sel&&conn.has(n.id));
    const risk=risksOn&&isRisk(n);
    return `<g class="node ${dim?'dim':''} ${risk?'risk':''}" data-id="${esc(n.id)}" transform="translate(${p.x},${p.y})">
      <circle r="${r}" fill="${colorFor(n)}"></circle>
      ${showLabel?`<text x="${r+3}" y="3">${esc(n.name).slice(0,38)}</text>`:''}</g>`;
  }).join('');
  document.getElementById('canvas').querySelector('#msg')?.remove();
  let svg=document.getElementById('gsvg');
  const inner=`<g transform="${T}">${edgeSvg}${nodeSvg}</g>`;
  if(!svg){
    document.getElementById('canvas').insertAdjacentHTML('beforeend',`<svg id="gsvg">${inner}</svg>`);
    svg=document.getElementById('gsvg'); attachPanZoom(svg);
  } else svg.innerHTML=inner;
  svg.querySelectorAll('.node').forEach(g=>g.addEventListener('click',ev=>{ev.stopPropagation();select(g.dataset.id);}));
}

function attachPanZoom(svg){
  let dragging=false,sx=0,sy=0;
  svg.addEventListener('wheel',e=>{ e.preventDefault(); const f=e.deltaY<0?1.12:0.89; const r=svg.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top; view.x=mx-(mx-view.x)*f; view.y=my-(my-view.y)*f; view.k*=f; draw(); },{passive:false});
  svg.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return; dragging=true; svg.classList.add('drag'); sx=e.clientX-view.x; sy=e.clientY-view.y; });
  window.addEventListener('mousemove',e=>{ if(!dragging)return; view.x=e.clientX-sx; view.y=e.clientY-sy; draw(); });
  window.addEventListener('mouseup',()=>{ dragging=false; svg.classList.remove('drag'); });
  svg.addEventListener('click',()=>{ if(sel){sel=null; draw(); document.getElementById('detail').innerHTML='';} });
}

function select(id){
  sel=id; draw();
  const n=BYID[id]; if(!n) return;
  const out=EDGES.filter(e=>e.from===id).map(e=>({type:e.type,o:BYID[e.to]}));
  const inc=EDGES.filter(e=>e.to===id).map(e=>({type:e.type,o:BYID[e.from]}));
  const link = n.url ? `<a href="${esc(n.url)}" target="_blank">Confluence ↗</a>`
            : (n.confluence ? `<a href="https://shiptify.atlassian.net/wiki/spaces/TD/pages/${esc(n.confluence)}" target="_blank">Confluence ↗</a>` : '');
  const spanInfo = (n.type==='feature'||n.type==='modal')&&span[id]>1 ? `<div class="muted">встречается в ${span[id]} доменах (кросс-модульно)</div>`:'';
  document.getElementById('detail').innerHTML=`
    <hr style="border:none;border-top:1px solid var(--line);margin:14px 0">
    <h2>${esc(n.name)} <span class="pill" style="background:${colorFor(n)}22;color:${colorFor(n)}">${esc(n.type)}</span></h2>
    ${n.summary?`<div class="muted" style="margin:5px 0">${esc(n.summary)}</div>`:''}
    ${n.route?`<div class="muted">роут: <code>${esc(n.route)}</code></div>`:''}
    ${spanInfo}
    <div style="margin:6px 0">${link}</div>
    <div class="muted">связей: ${out.length+inc.length}</div>
    ${out.length?`<div style="margin-top:8px;font-size:11px;text-transform:uppercase;color:var(--muted)">Исходящие</div>${out.slice(0,40).map(o=>`<div class="rel">${esc(o.type)} → <b>${esc(o.o?.name||'?')}</b></div>`).join('')}`:''}
    ${inc.length?`<div style="margin-top:8px;font-size:11px;text-transform:uppercase;color:var(--muted)">Входящие</div>${inc.slice(0,40).map(o=>`<div class="rel"><b>${esc(o.o?.name||'?')}</b> ${esc(o.type)} →</div>`).join('')}`:''}`;
}

function doSearch(q){
  if(!q) return;
  const hit=NODES.find(n=>n.name.toLowerCase().includes(q)&&TYPE[n.type]?.on) || NODES.find(n=>n.name.toLowerCase().includes(q));
  if(!hit) return;
  if(!TYPE[hit.type].on){ TYPE[hit.type].on=true; document.querySelector(`.chip[data-t="${hit.type}"]`)?.classList.remove('off'); relayout(); }
  const p=pos[hit.id]; if(p){ view.k=1.6; view.x=W/2-p.x*view.k; view.y=H/2-p.y*view.k; }
  select(hit.id);
}

function renderStats(){
  const {nodes,edges}=visible();
  const byType={}; nodes.forEach(n=>byType[n.type]=(byType[n.type]||0)+1);
  const cross = NODES.filter(n=>(n.type==='feature'||n.type==='modal')&&span[n.id]>1).length;
  const risks = NODES.filter(isRisk).length;
  document.getElementById('counts').textContent=`${nodes.length} узлов · ${edges.length} связей`;
  let html='<div style="font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Видно сейчас</div>';
  Object.entries(byType).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
    html+=`<div class="stat"><span><span class="dot" style="background:${(TYPE[t]||{}).color||'#999'}"></span> ${esc((TYPE[t]||{}).label||t)}</span><b>${c}</b></div>`;
  });
  html+=`<div class="stat" style="margin-top:6px"><span>🔗 кросс-модульных фич/модалок</span><b>${cross}</b></div>`;
  html+=`<div class="stat"><span>⚠ потенциальных рисков</span><b>${risks}</b></div>`;
  document.getElementById('stats').innerHTML=html;
}

window.addEventListener('resize',()=>{ if(NODES.length) relayout(); });
boot();
</script>
</body>
</html>
