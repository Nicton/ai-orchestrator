<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchify — QA Platform (TMS/RMS)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/theme.css" />
<script>(function(){try{var t=localStorage.getItem('searchify_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Roboto,Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--blue);text-decoration:none}
  button,input,select,textarea{font-family:inherit}
  .qwrap{display:flex;min-height:calc(100vh - 56px)}
  .side{width:210px;flex:0 0 210px;border-right:1px solid var(--line);background:var(--panel);padding:12px 8px}
  .side a{display:block;padding:8px 12px;border-radius:8px;color:var(--muted);font-size:14px;cursor:pointer}
  .side a:hover{background:var(--bg-soft);color:var(--ink)}
  .side a.active{background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue-dark);font-weight:600}
  .main{flex:1;padding:18px 22px;min-width:0}
  .topbar{display:flex;gap:10px;align-items:center;padding:10px 22px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  .topbar select,.topbar input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px}
  h1{font-size:20px;margin:0 0 12px}
  h2{font-size:16px;margin:18px 0 8px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .card .v{font-size:26px;font-weight:600}
  .card .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);background:var(--bg-soft)}
  tr:hover td{background:var(--bg-soft)}
  .gid{font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--blue-dark)}
  .qrow{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:6px;font-size:13px}
  .qrow:hover{background:var(--bg-soft)}
  .qrow.sel{background:color-mix(in srgb,var(--blue) 14%,transparent)}
  .qtog{width:14px;flex:0 0 14px;text-align:center;color:var(--muted);cursor:pointer;font-size:11px;user-select:none}
  .qname{flex:1;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qcount{flex:0 0 auto;background:var(--bg-soft);border:1px solid var(--line);border-radius:9px;padding:0 7px;font-size:11px;color:var(--muted)}
  .pill{display:inline-block;padding:1px 8px;border-radius:9px;font-size:11px;font-weight:600;background:var(--bg-soft);border:1px solid var(--line)}
  .pill.crit{background:#fde8e8;color:#b42318;border-color:#f4b9b9}
  .pill.ok{background:#e9f6ec;color:#1f9d57;border-color:#bfe6cb}
  .pill.warn{background:#fff3e0;color:#92560a;border-color:#ffd9a8}
  button.pri{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer}
  button.pri:hover{background:var(--blue-dark)}
  button.ghost{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
  button.ghost:hover{background:var(--bg-soft)}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .fld{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
  input[type=text],textarea,select.f{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px}
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal-mask.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:780px;width:100%;padding:18px 20px;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 12px;font-size:16px}
  .muted{color:var(--muted);font-size:13px}
  .err{color:var(--red);font-size:13px;min-height:16px}
  .steprow{display:flex;gap:8px;margin-bottom:6px}
  .steprow input{flex:1}
  .searchbox{position:relative}
  .results{position:absolute;top:38px;left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);z-index:90;max-height:320px;overflow:auto;display:none}
  .results.open{display:block}
  .results a{display:block;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app-nav"></div>
<script src="/nav.js"></script>

<div class="topbar">
  <b>🧬 QA Platform</b>
  <select id="projSel" title="Project"></select>
  <button class="ghost" id="newProjBtn">+ Project</button>
  <div class="searchbox" style="flex:1;max-width:420px">
    <input type="text" id="globalSearch" placeholder="Global search: REQ-1, TC-12, AT-3, или текст…" autocomplete="off" style="width:100%" />
    <div class="results" id="searchResults"></div>
  </div>
</div>

<div class="qwrap">
  <div class="side" id="side">
    <a data-view="dashboard">📊 Dashboard</a>
    <a data-view="requirements">📋 Requirements</a>
    <a data-view="testcases">🧪 Test Cases</a>
    <a data-view="checklists">✅ Checklists</a>
    <a data-view="sharedsteps">🔁 Shared Steps</a>
    <a data-view="automation">🤖 Automation</a>
    <a data-view="testplans">🗂 Test Plans</a>
    <a data-view="testruns">▶️ Test Runs</a>
    <a data-view="traceability">🕸 Traceability</a>
  </div>
  <div class="main" id="main"><p class="muted">Загрузка…</p></div>
</div>

<div class="modal-mask" id="modalMask"><div class="modal" id="modal"></div></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let PID=localStorage.getItem('qa_pid')||'';
let projects=[];

async function api(path,opts){
  const r=await fetch('/api/qa'+path,Object.assign({headers:{'content-type':'application/json'}},opts||{}));
  if(r.status===401){location.href='/login';throw new Error('auth');}
  const t=await r.text(); let j=null; try{j=t?JSON.parse(t):null;}catch(_){}
  if(!r.ok) throw new Error((j&&j.error&&(typeof j.error==='string'?j.error:JSON.stringify(j.error)))||t||('HTTP '+r.status));
  return j;
}
function openModal(html){ $('modal').innerHTML=html; $('modalMask').classList.add('open'); }
function closeModal(){ $('modalMask').classList.remove('open'); }
$('modalMask').addEventListener('click',e=>{ if(e.target===$('modalMask')) closeModal(); });

async function boot(){
  try{ const d=await api('/projects'); projects=d.items||[]; }catch(_){ projects=[]; }
  if(!projects.length){ $('main').innerHTML='<h1>QA Platform</h1><p class="muted">Нет проектов. Создайте первый проект.</p>'; }
  if(!PID && projects[0]) PID=projects[0].id;
  renderProjSel();
  route();
}
function renderProjSel(){
  $('projSel').innerHTML=projects.map(p=>`<option value="${esc(p.id)}"${p.id===PID?' selected':''}>${esc(p.globalId)} · ${esc(p.name)}</option>`).join('')||'<option value="">— нет —</option>';
}
$('projSel').addEventListener('change',e=>{ PID=e.target.value; localStorage.setItem('qa_pid',PID); route(); });
$('newProjBtn').addEventListener('click',()=>{
  openModal(`<h3>Новый проект</h3><label class="fld">Название</label><input type="text" id="pName"><label class="fld">Ключ (префикс)</label><input type="text" id="pKey" placeholder="APP"><div class="err" id="pErr"></div><div class="bar" style="margin-top:12px"><button class="pri" id="pSave">Создать</button><button class="ghost" onclick="closeModal()">Отмена</button></div>`);
  $('pSave').onclick=async()=>{ try{ const p=await api('/projects',{method:'POST',body:JSON.stringify({name:$('pName').value,key:$('pKey').value})}); projects.unshift(p); PID=p.id; localStorage.setItem('qa_pid',PID); renderProjSel(); closeModal(); route(); }catch(e){ $('pErr').textContent=e.message; } };
});

// ---- sidebar routing ----
const views={};
$('side').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{ location.hash='#/'+a.getAttribute('view'||'data-view'); }));
$('side').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{ location.hash='#/'+a.getAttribute('data-view'); }));
window.addEventListener('hashchange',route);
function curView(){ return (location.hash||'#/dashboard').replace('#/',''); }
function route(){
  const v=curView();
  $('side').querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.getAttribute('data-view')===v));
  if(!PID){ $('main').innerHTML='<p class="muted">Выберите или создайте проект.</p>'; return; }
  (views[v]||views.dashboard)();
}

// ---- helpers ----
function pri(p){ return `<span class="pill${p==='Critical'?' crit':''}">${esc(p||'')}</span>`; }
function pct(n){ return `<span class="pill${n>=100?' ok':(n>0?' warn':'')}">${n||0}%</span>`; }
async function loadList(path){ try{ return (await api(path)).items||[]; }catch(e){ $('main').innerHTML='<p class="err">'+esc(e.message)+'</p>'; return []; } }
// ---- sections (nested up to 15 levels) ----
const SEC_PATH={req:'requirement-sections',test:'test-sections'};
async function secList(kind){ try{ return (await api(`/projects/${PID}/${SEC_PATH[kind]}/tree`)).items||[]; }catch(_){ return []; } }
function secOptions(items,sel){ const byP={}; items.forEach(s=>{ (byP[s.parentId||'']=byP[s.parentId||'']||[]).push(s); }); const out=['<option value="">— без секции —</option>']; const walk=(pid,d)=>{ (byP[pid||'']||[]).forEach(s=>{ out.push(`<option value="${s.id}"${s.id===sel?' selected':''}>${'  '.repeat(d)}${d?'└ ':''}${esc(s.name)}</option>`); walk(s.id,d+1); }); }; walk('',0); return out.join(''); }
async function newSection(kind){ const name=prompt('Название секции:'); if(!name)return; const items=await secList(kind); const parent=items.length?prompt('ID родительской секции (пусто = корень). Доступные:\n'+items.map(s=>s.id+' — '+s.name).join('\n')):''; try{ await api(`/projects/${PID}/${SEC_PATH[kind]}`,{method:'POST',body:JSON.stringify({name,parentId:parent||undefined})}); }catch(e){ alert(e.message); } }
async function fillSec(kind,selectId,sel){ const items=await secList(kind); const el=$(selectId); if(el) el.innerHTML=secOptions(items,sel); }

// ---- Dashboard ----
views.dashboard=async()=>{
  $('main').innerHTML='<h1>📊 Dashboard</h1><p class="muted"><span class="spin"></span> загрузка…</p>';
  try{
    const s=await api(`/projects/${PID}/dashboard/summary`);
    const ex=await api(`/projects/${PID}/dashboard/execution`);
    const card=(l,v)=>`<div class="card"><div class="v">${v}</div><div class="l">${l}</div></div>`;
    $('main').innerHTML=`<h1>📊 Dashboard</h1>
    <h2>Requirements</h2><div class="cards">
      ${card('Всего',s.requirementsTotal)}${card('Реализовано',s.requirementsImplemented)}${card('Частично',s.requirementsPartiallyImplemented)}
      ${card('Покрыто тестами',s.requirementsCovered)}${card('Не покрыто',s.requirementsNotCovered)}${card('Critical без покрытия',s.criticalUncoveredRequirements)}</div>
    <h2>Tests & Automation</h2><div class="cards">
      ${card('Test cases',s.testCasesTotal)}${card('Автоматизировано',s.testCasesAutomated)}${card('Частично авто',s.testCasesPartiallyAutomated)}
      ${card('Avg automation',(s.averageAutomationCoverage||0)+'%')}${card('Automated tests',s.automatedTestsTotal)}</div>
    <h2>Execution</h2><div class="cards">
      ${card('Passed',ex.passed)}${card('Failed',ex.failed)}${card('Blocked',ex.blocked)}${card('Skipped',ex.skipped)}${card('Hanging',ex.hanging)}</div>`;
  }catch(e){ $('main').innerHTML='<h1>📊 Dashboard</h1><p class="err">'+esc(e.message)+'</p>'; }
};

// ---- Requirements ----
views.requirements=async()=>{
  $('main').innerHTML='<h1>📋 Requirements</h1><div class="bar"><button class="pri" id="addReq">+ Requirement</button><button class="ghost" id="impJira">⬇️ Импорт из Jira</button><select class="f" id="reqSecFilter" style="width:auto"></select><button class="ghost" id="newSec">+ секция</button></div><div id="reqList"><span class="spin"></span></div>';
  $('addReq').onclick=reqForm;
  $('impJira').onclick=jiraImport;
  await fillSec('req','reqSecFilter',window._reqSec||''); $('reqSecFilter').insertAdjacentHTML('afterbegin','<option value="">все секции</option>'); $('reqSecFilter').value=window._reqSec||'';
  $('reqSecFilter').onchange=e=>{ window._reqSec=e.target.value; views.requirements(); };
  $('newSec').onclick=async()=>{ await newSection('req'); views.requirements(); };
  const items=await loadList(`/projects/${PID}/requirements?pageSize=500${window._reqSec?'&sectionId='+window._reqSec:''}`);
  $('reqList').innerHTML=`<table><thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Status</th><th>Impl%</th><th>Type</th></tr></thead><tbody>
    ${items.map(r=>`<tr style="cursor:pointer" onclick="reqDetail('${r.id}')"><td class="gid">${esc(r.globalId)}</td><td>${esc(r.title)}</td><td>${pri(r.priority)}</td><td><span class="pill">${esc(r.status)}</span></td><td>${pct(r.implementationPercent)}</td><td class="muted">${esc(r.type)}</td></tr>`).join('')||'<tr><td colspan=6 class="muted">пусто</td></tr>'}
  </tbody></table>`;
};
function reqForm(){
  openModal(`<h3>Новое требование</h3><label class="fld">Title</label><input type="text" id="rT">
  <label class="fld">Description</label><textarea id="rD" rows="3"></textarea>
  <div class="bar"><div><label class="fld">Priority</label><select class="f" id="rP"><option>Critical</option><option>High</option><option selected>Medium</option><option>Low</option></select></div>
  <div><label class="fld">Type</label><select class="f" id="rTy"><option>Functional</option><option>Business</option><option>NonFunctional</option><option>UI</option><option>API</option><option>Integration</option><option>Security</option><option>Performance</option><option>Data</option><option>Permission</option><option>Reporting</option><option>Other</option></select></div>
  <div><label class="fld">Status</label><select class="f" id="rS"><option>Draft</option><option>Approved</option><option>Implemented</option><option>PartiallyImplemented</option><option>NeedsUpdate</option><option>Deprecated</option><option>Rejected</option></select></div></div>
  <label class="fld">Section</label><select class="f" id="rSec"></select>
  <div class="err" id="rErr"></div><div class="bar" style="margin-top:12px"><button class="pri" id="rSave">Создать</button><button class="ghost" onclick="closeModal()">Отмена</button></div>`);
  fillSec('req','rSec');
  $('rSave').onclick=async()=>{ try{ await api(`/projects/${PID}/requirements`,{method:'POST',body:JSON.stringify({title:$('rT').value,description:$('rD').value,priority:$('rP').value,type:$('rTy').value,status:$('rS').value,sectionId:$('rSec').value||undefined})}); closeModal(); views.requirements(); }catch(e){ $('rErr').textContent=e.message; } };
}
window.reqDetail=async(id)=>{
  try{ const r=await api(`/requirements/${id}`); const c=r.coverage||{};
    const tcRows=(r.linkedTestCases||[]).map(t=>`<tr><td class="gid">${esc(t.globalId)}</td><td>${esc(t.title)}${t.isDeleted?' <span class="pill warn">deleted</span>':''}</td><td>${pct(t.automationCoveragePercent)}</td></tr>`).join('');
    const atRows=(r.linkedAutomatedTests||[]).map(a=>`<tr><td class="gid">${esc(a.globalId)}</td><td>${esc(a.name)}${a.isDeleted?' <span class="pill warn">deleted</span>':''}</td><td class="muted">${esc(a.framework||'')} · ${esc(a.lastRunStatus||'—')}</td></tr>`).join('');
    const runRows=(r.recentRuns||[]).map(x=>`<tr><td>${esc(x.titleSnapshot||'')}</td><td><span class="pill">${esc(x.status)}</span></td><td class="muted">${x.executedAt?new Date(x.executedAt).toLocaleString():''}</td></tr>`).join('');
    openModal(`<h3>${esc(r.globalId)} · ${esc(r.title)}</h3>
    <p class="muted">${esc(r.description||'')}</p>
    <div class="bar">${pri(r.priority)}<span class="pill">${esc(r.status)}</span>${pct(r.implementationPercent)}<span class="pill">${esc(r.type)}</span><button class="ghost" onclick="showVersions('requirements','${id}')">🕓 Версии</button></div>
    <h2>Coverage</h2><div class="cards"><div class="card"><div class="v">${c.linkedTestCasesCount||0}</div><div class="l">test cases</div></div><div class="card"><div class="v">${c.automationCoveragePercent||0}%</div><div class="l">automation</div></div><div class="card"><div class="v">${esc(c.lastValidationStatus||'—')}</div><div class="l">last validation</div></div></div>
    <h2>Linked test cases</h2><table><tbody>${tcRows||'<tr><td class="muted">нет</td></tr>'}</tbody></table>
    <h2>Linked automated tests</h2><table><tbody>${atRows||'<tr><td class="muted">нет</td></tr>'}</tbody></table>
    ${runRows?`<h2>Recent runs</h2><table><tbody>${runRows}</tbody></table>`:''}
    <h2>Sources (${(r.sources||[]).length})</h2><div class="muted" id="srcList">${(r.sources||[]).map(s=>`${esc(s.type)}: ${esc(s.title||s.url||s.externalId||'')}`).join('<br>')||'—'}</div>
    <div class="bar"><select class="f" id="sType" style="width:auto"><option>Jira</option><option>Confluence</option><option>Presentation</option><option>Document</option><option>MeetingNotes</option><option>CodeAnalysis</option><option>Other</option></select><input type="text" id="sTitle" placeholder="title / url / externalId" style="flex:1"><button class="ghost" id="addSrc">+ источник</button></div>
    <h2>Acceptance criteria</h2><div class="muted" id="acList">${(r.acceptanceCriteria||[]).map(a=>'• '+esc(a.text)).join('<br>')||'—'}</div>
    <div class="bar"><input type="text" id="acText" placeholder="новый критерий" style="flex:1"><button class="ghost" id="addAc">+ критерий</button></div>
    <h2>Implementation</h2><div class="bar"><select class="f" id="iS" style="width:auto"><option>NotStarted</option><option>PartiallyImplemented</option><option>Implemented</option><option>Deprecated</option><option>Unknown</option></select>
    <input type="text" id="iP" value="${r.implementationPercent||0}" style="width:80px"><button class="pri" id="iSave">Сохранить</button></div>
    <div class="err" id="rdErr"></div><div class="bar" style="margin-top:10px"><button class="ghost" onclick="closeModal()">Закрыть</button></div>`);
    $('iS').value=r.implementationStatus||'Unknown';
    $('iSave').onclick=async()=>{ await api(`/requirements/${id}`,{method:'PATCH',body:JSON.stringify({implementationStatus:$('iS').value,implementationPercent:parseInt($('iP').value,10)||0})}); closeModal(); if(curView()==='traceability') views.traceability(); else views.requirements(); };
    $('addSrc').onclick=async()=>{ try{ await api(`/requirements/${id}/sources`,{method:'POST',body:JSON.stringify({type:$('sType').value,title:$('sTitle').value,url:/^https?:/.test($('sTitle').value)?$('sTitle').value:undefined,externalId:/^[A-Z]+-\d+$/.test($('sTitle').value)?$('sTitle').value:undefined})}); reqDetail(id); }catch(e){ $('rdErr').textContent=e.message; } };
    $('addAc').onclick=async()=>{ try{ await api(`/requirements/${id}/acceptance-criteria`,{method:'POST',body:JSON.stringify({text:$('acText').value})}); reqDetail(id); }catch(e){ $('rdErr').textContent=e.message; } };
  }catch(e){ openModal('<p class="err">'+esc(e.message)+'</p>'); }
};
window.showVersions=async(entity,id)=>{
  try{ const d=await api(`/${entity}/${id}/versions`);
    openModal(`<h3>🕓 Версии</h3><table><thead><tr><th>v</th><th>Когда</th><th>Автор</th><th>Комментарий</th><th></th></tr></thead><tbody>
    ${(d.items||[]).map(v=>`<tr><td>${v.versionNumber}</td><td class="muted">${new Date(v.createdAt).toLocaleString()}</td><td class="muted">${esc(v.createdBy||'')}</td><td>${esc(v.comment||v.changeReason||'')}</td><td><button class="ghost" onclick="restoreVer('${entity}','${id}',${v.versionNumber})">Restore</button></td></tr>`).join('')||'<tr><td colspan=5 class="muted">нет версий</td></tr>'}
    </tbody></table><div class="bar" style="margin-top:10px"><button class="ghost" onclick="closeModal()">Закрыть</button></div>`);
  }catch(e){ openModal('<p class="err">'+esc(e.message)+'</p>'); }
};
window.restoreVer=async(entity,id,n)=>{ if(!confirm('Восстановить версию '+n+' как актуальную?'))return; try{ await api(`/${entity}/${id}/versions/${n}/restore`,{method:'POST',body:'{}'}); closeModal(); alert('Восстановлено как новая версия'); }catch(e){ alert(e.message); } };
function jiraImport(){
  openModal(`<h3>⬇️ Импорт требований из Jira</h3><label class="fld">Ключи задач (через запятую) — или оставьте пустым и задайте JQL</label><input type="text" id="jKeys" placeholder="TD-1203, AUTH-1">
  <label class="fld">JQL (если ключи не заданы)</label><input type="text" id="jJql" placeholder='project = TD AND status = "Ready for QA" ORDER BY created DESC'>
  <label class="fld">Лимит</label><input type="text" id="jMax" value="50" style="width:90px">

function libChildren(pid){ return (window._lib.secs||[]).filter(s=>(s.parentId||'')===(pid||'')); }
function libCount(secId){ const {tcs,cls}=window._lib; let n=tcs.filter(t=>(t.sectionId||'')===secId).length+cls.filter(c=>(c.sectionId||'')===secId).length; for(const ch of libChildren(secId)) n+=libCount(ch.id); return n; }
function renderTree(){
  const {tcs,cls}=window._lib; const total=tcs.length+cls.length;
  let html=`<div class="qrow${window._tcSec===''?' sel':''}"><span class="qtog"></span><span class="qname" onclick="selSec('')">📂 Все</span><span class="qcount">${total}</span></div>`;
  const node=(s,d)=>{ const kids=libChildren(s.id); const exp=window._libExp.has(s.id);
    let h=`<div class="qrow${window._tcSec===s.id?' sel':''}" style="padding-left:${4+d*14}px">`+(kids.length?`<span class="qtog" onclick="togSec('${s.id}')">${exp?'▾':'▸'}</span>`:'<span class="qtog"></span>')+`<span class="qname" onclick="selSec('${s.id}')">📁 ${esc(s.name)}</span><span class="qcount">${libCount(s.id)}</span></div>`;
    if(exp) for(const k of kids) h+=node(k,d+1);
    return h; };
  for(const s of libChildren('')) html+=node(s,0);
  $('qtree').innerHTML=html;
}
window.selSec=id=>{ window._tcSec=id; renderTree(); renderItems(); };
window.togSec=id=>{ if(window._libExp.has(id)) window._libExp.delete(id); else window._libExp.add(id); renderTree(); };
function renderItems(){

  $('selAll').onclick=()=>{ document.querySelectorAll('.selRow').forEach(row=>{ if(row.style.display!=='none') row.querySelector('.selItem').checked=true; }); upd(); };
  $('selNone').onclick=()=>{ document.querySelectorAll('.selItem').forEach(c=>c.checked=false); upd(); };
  $('tpSave').onclick=async()=>{ try{ const items=[...document.querySelectorAll('.selItem:checked')].map(c=>({sourceType:c.dataset.type,sourceId:c.value})); if(!items.length){ $('tpErr').textContent='выберите хотя бы один пункт'; return; } await api(`/projects/${PID}/test-plans`,{method:'POST',body:JSON.stringify({title:$('tpT').value,type:$('tpTy').value,items})}); closeModal(); views.testplans(); }catch(e){ $('tpErr').textContent=e.message; } };
}
window.tpRun=async(id,title)=>{ try{ const run=await api(`/test-plans/${id}/runs`,{method:'POST',body:JSON.stringify({title:'Run: '+title})}); await api(`/test-runs/${run.id}/start`,{method:'POST',body:'{}'}); location.hash='#/testruns'; }catch(e){ alert(e.message); } };

// ---- Test Runs ----
views.testruns=async()=>{
  $('main').innerHTML='<h1>▶️ Test Runs</h1><div id="trList"><span class="spin"></span></div>';
  const items=await loadList(`/projects/${PID}/test-runs`);
  $('trList').innerHTML=`<table><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Source</th></tr></thead><tbody>${items.map(r=>`<tr style="cursor:pointer" onclick="trDetail('${r.id}')"><td class="gid">${esc(r.globalId)}</td><td>${esc(r.title)}</td><td><span class="pill">${esc(r.status)}</span></td><td class="muted">${esc(r.source)}</td></tr>`).join('')||'<tr><td colspan=4 class="muted">пусто</td></tr>'}</tbody></table>`;
};
window.trDetail=async(id)=>{
  try{ const r=await api(`/test-runs/${id}`);
    openModal(`<h3>${esc(r.globalId)} · ${esc(r.title)}</h3><div class="bar"><span class="pill">${esc(r.status)}</span><button class="ghost" onclick="trFinish('${id}')">Finish</button></div>
    <table><thead><tr><th>Item</th><th>Status</th><th>Mark</th></tr></thead><tbody>${(r.items||[]).map(it=>`<tr><td>${esc(it.titleSnapshot||it.globalId)}</td><td><span class="pill">${esc(it.status)}</span></td><td>${['Passed','Failed','Blocked','Skipped'].map(s=>`<button class="ghost" style="padding:3px 7px" onclick="mark('${id}','${it.id}','${s}')">${s[0]}</button>`).join(' ')}</td></tr>`).join('')||'<tr><td colspan=3 class="muted">нет items</td></tr>'}</tbody></table>
    <div class="bar" style="margin-top:10px"><button class="ghost" onclick="closeModal()">Закрыть</button></div>`);
  }catch(e){ openModal('<p class="err">'+esc(e.message)+'</p>'); }
};
window.mark=async(runId,itemId,status)=>{ try{ await api(`/test-runs/${runId}/items/${itemId}/result`,{method:'POST',body:JSON.stringify({status})}); trDetail(runId); }catch(e){ alert(e.message); } };
window.trFinish=async(id)=>{ try{ await api(`/test-runs/${id}/finish`,{method:'POST',body:'{}'}); trDetail(id); }catch(e){ alert(e.message); } };

// ---- Traceability ----
views.traceability=async()=>{
  $('main').innerHTML='<h1>🕸 Traceability Matrix</h1><div id="trc"><span class="spin"></span></div>';
  const items=await loadList(`/projects/${PID}/traceability`);
  $('trc').innerHTML=`<div style="overflow:auto"><table><thead><tr><th>Req</th><th>Title</th><th>Priority</th><th>Impl</th><th>TCs</th><th>Auto%</th><th>Last</th><th>Coverage</th></tr></thead><tbody>
    ${items.map(r=>`<tr style="cursor:pointer" onclick="reqDetail('${r.requirementId}')"><td class="gid">${esc(r.globalId)}</td><td>${esc(r.title)}</td><td>${pri(r.priority)}</td><td>${r.implementationPercent||0}%</td><td>${r.linkedTestCasesCount||0}</td><td>${pct(r.automationCoveragePercent)}</td><td class="muted">${esc(r.lastValidationStatus||'—')}</td><td><span class="pill${r.coverageStatus==='NotCovered'?' crit':(/Covered|Automated/.test(r.coverageStatus)?' ok':' warn')}">${esc(r.coverageStatus)}</span></td></tr>`).join('')||'<tr><td colspan=8 class="muted">нет требований</td></tr>'}
  </tbody></table></div>`;
};

// ---- Global search ----
let searchT;
$('globalSearch').addEventListener('input',e=>{ clearTimeout(searchT); const q=e.target.value.trim(); if(q.length<2){ $('searchResults').classList.remove('open'); return; } searchT=setTimeout(async()=>{ try{ const d=await api(`/projects/${PID}/search?query=${encodeURIComponent(q)}`); $('searchResults').innerHTML=(d.items||[]).map(it=>`<a href="${esc(it.directUrl)}" onclick="return openEntity(event,'${it.entityType}','${it.id}')"><span class="gid">${esc(it.globalId||'')}</span> ${esc(it.title||'')} <span class="muted">${esc(it.entityType)}${it.isDeleted?' · deleted':''}</span></a>`).join('')||'<a class="muted">ничего</a>'; $('searchResults').classList.add('open'); }catch(_){} },250); });
window.openEntity=(e,type,id)=>{ e.preventDefault(); $('searchResults').classList.remove('open'); $('globalSearch').value=''; if(type==='Requirement') reqDetail(id); else if(type==='TestCase') tcDetail(id); else if(type==='TestRun') trDetail(id); else { location.hash='#/'+(type==='AutomatedTest'?'automation':type==='Checklist'?'checklists':'dashboard'); } return false; };
document.addEventListener('click',e=>{ if(!e.target.closest('.searchbox')) $('searchResults').classList.remove('open'); });

boot();
</script>
</body>
</html>
