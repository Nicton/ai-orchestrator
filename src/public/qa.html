<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchify — QA Platform (TMS/RMS)</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="stylesheet" href="/theme.css" />
<script>(function(){try{var t=localStorage.getItem('searchify_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',Roboto,Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--blue);text-decoration:none}
  button,input,select,textarea{font-family:inherit}
  .qwrap{display:flex;min-height:calc(100vh - 56px)}
  .side{width:210px;flex:0 0 210px;border-right:1px solid var(--line);background:var(--panel);padding:12px 8px}
  .side a{display:block;padding:8px 12px;border-radius:8px;color:var(--muted);font-size:14px;cursor:pointer}
  .side a:hover{background:var(--bg-soft);color:var(--ink)}
  .side a.active{background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue-dark);font-weight:600}
  .main{flex:1;padding:18px 22px;min-width:0}
  .topbar{display:flex;gap:10px;align-items:center;padding:10px 22px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  .topbar select,.topbar input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px}
  h1{font-size:20px;margin:0 0 12px}
  h2{font-size:16px;margin:18px 0 8px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .card .v{font-size:26px;font-weight:600}
  .card .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:4px}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);background:var(--bg-soft)}
  tr:hover td{background:var(--bg-soft)}
  .gid{font-family:ui-monospace,Consolas,monospace;font-size:12px;color:var(--blue-dark)}
  .qrow{display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:6px;font-size:13px}
  .qrow:hover{background:var(--bg-soft)}
  .qrow.sel{background:color-mix(in srgb,var(--blue) 14%,transparent)}
  .qtog{width:14px;flex:0 0 14px;text-align:center;color:var(--muted);cursor:pointer;font-size:11px;user-select:none}
  .qname{flex:1;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qcount{flex:0 0 auto;background:var(--bg-soft);border:1px solid var(--line);border-radius:9px;padding:0 7px;font-size:11px;color:var(--muted)}
  .qrow.dropt{outline:2px dashed var(--blue);outline-offset:-2px;background:color-mix(in srgb,var(--blue) 10%,transparent)}
  .qacts{flex:0 0 auto;display:none;gap:2px}
  .qrow:hover .qacts{display:inline-flex}
  .qacts button{border:none;background:none;cursor:pointer;font-size:12px;padding:0 3px;color:var(--muted)}
  .qacts button:hover{color:var(--ink)}
  tr[draggable=true]{cursor:grab}
  .pill{display:inline-block;padding:1px 8px;border-radius:9px;font-size:11px;font-weight:600;background:var(--bg-soft);border:1px solid var(--line)}
  .pill.crit{background:#fde8e8;color:#b42318;border-color:#f4b9b9}
  .pill.ok{background:#e9f6ec;color:#1f9d57;border-color:#bfe6cb}
  .pill.warn{background:#fff3e0;color:#92560a;border-color:#ffd9a8}
  button.pri{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer}
  button.pri:hover{background:var(--blue-dark)}
  button.ghost{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
  button.ghost:hover{background:var(--bg-soft)}
  .bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .fld{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
  input[type=text],textarea,select.f{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink);font-size:13px}
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto}
  .modal-mask.open{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:780px;width:100%;padding:18px 20px;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 12px;font-size:16px}
  .muted{color:var(--muted);font-size:13px}
  .err{color:var(--red);font-size:13px;min-height:16px}
  .steprow{display:flex;gap:8px;margin-bottom:6px}
  .steprow input{flex:1}
  .searchbox{position:relative}
  .results{position:absolute;top:38px;left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);z-index:90;max-height:320px;overflow:auto;display:none}
  .results.open{display:block}
  .results a{display:block;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app-nav"></div>
<script src="/nav.js"></script>

<div class="topbar">
  <b>🧬 QA Platform</b>
  <select id="projSel" title="Project"></select>
  <button class="ghost" id="newProjBtn">+ Project</button>
  <div class="searchbox" style="flex:1;max-width:420px">
    <input type="text" id="globalSearch" placeholder="Global search: REQ-1, TC-12, AT-3, или текст…" autocomplete="off" style="width:100%" />
    <div class="results" id="searchResults"></div>
  </div>
</div>

<div class="qwrap">
  <div class="side" id="side">
    <a data-view="dashboard">📊 Dashboard</a>
    <a data-view="requirements">📋 Requirements</a>
    <a data-view="testcases">🧪 Test Library</a>
    <a data-view="sharedsteps">🔁 Shared Steps</a>
    <a data-view="automation">🤖 Automation</a>
    <a data-view="testplans">🗂 Test Plans</a>
    <a data-view="testruns">▶️ Test Runs</a>
    <a data-view="traceability">🕸 Traceability</a>
    <a data-view="trash">🗑 Корзина</a>
  </div>
  <div class="main" id="main"><p class="muted">Загрузка…</p></div>
</div>

<div class="modal-mask" id="modalMask"><div class="modal" id="modal"></div></div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let PID=localStorage.getItem('qa_pid')||'';
let projects=[];

async function api(path,opts){
  opts=opts||{}; const headers=Object.assign({},opts.headers); if(opts.body!=null) headers['content-type']='application/json';
  const r=await fetch('/api/qa'+path,Object.assign({},opts,{headers}));
  if(r.status===401){location.href='/login';throw new Error('auth');}
  const t=await r.text(); let j=null; try{j=t?JSON.parse(t):null;}catch(_){}
  if(!r.ok) throw new Error((j&&j.error&&(typeof j.error==='string'?j.error:JSON.stringify(j.error)))||t||('HTTP '+r.status));
  return j;
}
function openModal(html){ $('modal').innerHTML=html; $('modalMask').classList.add('open'); }
function closeModal(){ $('modalMask').classList.remove('open'); if(window._modalGid){ window._modalGid=null; navTo(curView(),true); } }
$('modalMask').addEventListener('click',e=>{ if(e.target===$('modalMask')) closeModal(); });
// Deep-link helpers: modal URL carries the globalId (#/view/GLOBAL-ID) so reload reopens it.
function navTo(hash,silent){ const h='#/'+String(hash).replace(/^#?\/?/,''); if(location.hash===h) return; if(silent) window._silentHash=true; location.hash=h; }
function setModalUrl(view,gid){ window._modalGid=gid; navTo(view+'/'+encodeURIComponent(gid),true); }

async function boot(){
  try{ const d=await api('/projects'); projects=d.items||[]; }catch(_){ projects=[]; }
  if(!projects.length){ $('main').innerHTML='<h1>QA Platform</h1><p class="muted">Нет проектов. Создайте первый проект.</p>'; }
  if(!PID && projects[0]) PID=projects[0].id;
  renderProjSel();
  route();
}
function renderProjSel(){
  $('projSel').innerHTML=projects.map(p=>`<option value="${esc(p.id)}"${p.id===PID?' selected':''}>${esc(p.globalId)} · ${esc(p.name)}</option>`).join('')||'<option value="">— нет —</option>';
}
$('projSel').addEventListener('change',e=>{ PID=e.target.value; localStorage.setItem('qa_pid',PID); route(); });
$('newProjBtn').addEventListener('click',()=>{
  openModal(`<h3>Новый проект</h3><label class="fld">Название</label><input type="text" id="pName"><label class="fld">Ключ (префикс)</label><input type="text" id="pKey" placeholder="APP"><div class="err" id="pErr"></div><div class="bar" style="margin-top:12px"><button class="pri" id="pSave">Создать</button><button class="ghost" onclick="closeModal()">Отмена</button></div>`);
  $('pSave').onclick=async()=>{ try{ const p=await api('/projects',{method:'POST',body:JSON.stringify({name:$('pName').value,key:$('pKey').value})}); projects.unshift(p); PID=p.id; localStorage.setItem('qa_pid',PID); renderProjSel(); closeModal(); route(); }catch(e){ $('pErr').textContent=e.message; } };
});

// ---- sidebar routing ----
const views={};
$('side').querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{ window._modalGid=null; location.hash='#/'+a.getAttribute('data-view'); }));
window.addEventListener('hashchange',()=>{ if(window._silentHash){ window._silentHash=false; return; } route(); });
function curView(){ return ((location.hash||'#/dashboard').replace(/^#\//,'').split('/')[0])||'dashboard'; }
function curSub(){ const p=(location.hash||'').replace(/^#\//,'').split('/'); return p.length>1?decodeURIComponent(p.slice(1).join('/')):''; }
function route(){
  const v=curView();
  $('side').querySelectorAll('a').forEach(a=>a.classList.toggle('active',a.getAttribute('data-view')===v));
  if(!PID){ $('main').innerHTML='<p class="muted">Выберите или создайте проект.</p>'; return; }
  window._deepGid=curSub()||null;
  (views[v]||views.dashboard)();
}

// ---- helpers ----
function pri(p){ return `<span class="pill${p==='Critical'?' crit':''}">${esc(p||'')}</span>`; }
function pct(n){ return `<span class="pill${n>=100?' ok':(n>0?' warn':'')}">${n||0}%</span>`; }
async function loadList(path){ try{ return (await api(path)).items||[]; }catch(e){ $('main').innerHTML='<p class="err">'+esc(e.message)+'</p>'; return []; } }
// ---- sections (nested up to 15 levels) ----
const SEC_PATH={req:'requirement-sections',test:'test-sections'};
async function secList(kind){ try{ return (await api(`/projects/${PID}/${SEC_PATH[kind]}/tree`)).items||[]; }catch(_){ return []; } }
function secOptions(items,sel){ const byP={}; items.forEach(s=>{ (byP[s.parentId||'']=byP[s.parentId||'']||[]).push(s); }); const out=['<option value="">— без секции —</option>']; const walk=(pid,d)=>{ (byP[pid||'']||[]).forEach(s=>{ out.push(`<option value="${s.id}"${s.id===sel?' selected':''}>${'  '.repeat(d)}${d?'└ ':''}${esc(s.name)}</option>`); walk(s.id,d+1); }); }; walk('',0); return out.join(''); }
async function newSection(kind){ const name=prompt('Название секции:'); if(!name)return; const items=await secList(kind); const parent=items.length?prompt('ID родительской секции (пусто = корень). Доступные:\n'+items.map(s=>s.id+' — '+s.name).join('\n')):''; try{ await api(`/projects/${PID}/${SEC_PATH[kind]}`,{method:'POST',body:JSON.stringify({name,parentId:parent||undefined})}); }catch(e){ alert(e.message); } }
async function fillSec(kind,selectId,sel){ const items=await secList(kind); const el=$(selectId); if(el) el.innerHTML=secOptions(items,sel); }

// ---- Dashboard ----
views.dashboard=async()=>{
  $('main').innerHTML='<h1>📊 Dashboard</h1><p class="muted"><span class="spin"></span> загрузка…</p>';
  try{
    const s=await api(`/projects/${PID}/dashboard/summary`);
    const ex=await api(`/projects/${PID}/dashboard/execution`);
    const card=(l,v)=>`<div class="card"><div class="v">${v}</div><div class="l">${l}</div></div>`;
    $('main').innerHTML=`<h1>📊 Dashboard</h1>
    <h2>Requirements</h2><div class="cards">
      ${card('Всего',s.requirementsTotal)}${card('Реализовано',s.requirementsImplemented)}${card('Частично',s.requirementsPartiallyImplemented)}
      ${card('Покрыто тестами',s.requirementsCovered)}${card('Не покрыто',s.requirementsNotCovered)}${card('Critical без покрытия',s.criticalUncoveredRequirements)}</div>
    <h2>Tests & Automation</h2><div class="cards">
      ${card('Test cases',s.testCasesTotal)}${card('Автоматизировано',s.testCasesAutomated)}${card('Частично авто',s.testCasesPartiallyAutomated)}
      ${card('Avg automation',(s.averageAutomationCoverage||0)+'%')}${card('Automated tests',s.automatedTestsTotal)}</div>
    <h2>Execution</h2><div class="cards">
      ${card('Passed',ex.passed)}${card('Failed',ex.failed)}${card('Blocked',ex.blocked)}${card('Skipped',ex.skipped)}${card('Hanging',ex.hanging)}</div>
    <div id="dashGrid"><p class="muted"><span class="spin"></span> аналитика…</p></div>`;
    try{
      const [dr,da,dt]=await Promise.all([
        api(`/projects/${PID}/dashboard/requirements`),
        api(`/projects/${PID}/dashboard/automation`),
        api(`/projects/${PID}/dashboard/traceability`),
      ]);
      const bars=obj=>{ const e=Object.entries(obj||{}); const max=Math.max(1,...e.map(([,v])=>v)); return e.length?`<table><tbody>${e.map(([k,v])=>`<tr><td style="white-space:nowrap">${esc(k)}</td><td style="width:100%"><div style="background:color-mix(in srgb,var(--blue) 60%,transparent);height:14px;border-radius:4px;width:${Math.round(v/max*100)}%;min-width:2px"></div></td><td class="gid">${v}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">пусто</p>'; };
      $('dashGrid').innerHTML=`
      <h2>Requirements — разбивка</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px">
        <div><h3 style="font-size:13px;margin:0 0 6px">По статусу</h3>${bars(dr.byStatus)}</div>
        <div><h3 style="font-size:13px;margin:0 0 6px">По приоритету</h3>${bars(dr.byPriority)}</div>
        <div><h3 style="font-size:13px;margin:0 0 6px">По типу</h3>${bars(dr.byType)}</div>
      </div>
      <div class="cards" style="margin-top:12px">${card('Avg impl%',(dr.implementationPercentAvg||0)+'%')}${card('Без источников',dr.withoutSources)}${card('Без тест-кейсов',dr.withoutTestCases)}${card('Без автоматизации',dr.withoutAutomation)}${card('Critical без покрытия',dr.criticalUncovered)}</div>
      <h2>Automation</h2><div class="cards">${card('Avg coverage',(da.averageCoveragePercent||0)+'%')}${card('Automated',da.automated)}${card('Partially',da.partiallyAutomated)}${card('Not automated',da.notAutomated)}${card('Active AT',da.active)}${card('Flaky AT',da.flaky)}</div>
      <h2>Traceability — покрытие требований</h2>${bars(dt.byCoverage)}`;
    }catch(e){ $('dashGrid').innerHTML='<p class="err">'+esc(e.message)+'</p>'; }
  }catch(e){ $('main').innerHTML='<h1>📊 Dashboard</h1><p class="err">'+esc(e.message)+'</p>'; }
};

// ---- Requirements (дерево системы: модули/секции → требования) ----
views.requirements=async()=>{
  $('main').innerHTML='<h1>📋 Requirements</h1><div class="bar"><button class="pri" id="addReq">+ Requirement</button><button class="ghost" id="newSecR">+ Модуль (секция)</button><button class="ghost" id="impJira">⬇️ Импорт из Jira</button></div><div style="display:flex;gap:16px;align-items:flex-start"><div id="rtree" style="width:330px;flex:0 0 330px;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:8px;max-height:70vh;overflow:auto"></div><div id="ritems" style="flex:1;min-width:0"></div></div>';
  $('addReq').onclick=()=>reqForm();
  $('impJira').onclick=jiraImport;
  $('newSecR').onclick=async()=>{ const name=prompt('Название корневого модуля/секции:'); if(!name) return; try{ await api(`/projects/${PID}/requirement-sections`,{method:'POST',body:JSON.stringify({name})}); views.requirements(); }catch(e){ alert(e.message); } };
  $('rtree').innerHTML='<span class="spin"></span>';
  const [secs,reqs]=await Promise.all([secList('req'),loadList(`/projects/${PID}/requirements?pageSize=3000`)]);
  window._rlib={secs,reqs};
  if(!window._rlibExp) window._rlibExp=new Set();
  if(window._reqSecSel===undefined) window._reqSecSel='';
  renderReqTree(); renderReqItems();
  if(window._deepGid){ const g=window._deepGid; window._deepGid=null; openReqByGid(g); }
};
function rlibChildren(pid){ return (window._rlib.secs||[]).filter(s=>(s.parentId||'')===(pid||'')); }
function rlibCount(secId){ let n=(window._rlib.reqs||[]).filter(r=>(r.sectionId||'')===secId).length; for(const ch of rlibChildren(secId)) n+=rlibCount(ch.id); return n; }
function renderReqTree(){
  const total=(window._rlib.reqs||[]).length;
  let html=`<div class="qrow${window._reqSecSel===''?' sel':''}" ondragover="qaAllow(event)" ondragleave="qaLeave(event)" ondrop="reqDrop(event,'')"><span class="qtog"></span><span class="qname" onclick="selReqSec('')">📂 Все требования</span><span class="qcount">${total}</span></div>`;
  const node=(s,d)=>{ const kids=rlibChildren(s.id); const exp=window._rlibExp.has(s.id);
    let h=`<div class="qrow${window._reqSecSel===s.id?' sel':''}" draggable="true" data-sec="${s.id}" ondragstart="qaDragStart(event,'rsection','${s.id}')" ondragover="qaAllow(event)" ondragleave="qaLeave(event)" ondrop="reqDrop(event,'${s.id}')" style="padding-left:${4+d*14}px">`+(kids.length?`<span class="qtog" onclick="togReqSec('${s.id}')">${exp?'▾':'▸'}</span>`:'<span class="qtog"></span>')+`<span class="qname" onclick="selReqSec('${s.id}')">📁 ${esc(s.name)}</span><span class="qcount">${rlibCount(s.id)}</span><span class="qacts"><button title="Переименовать" onclick="renameReqSec(event,'${s.id}')">✏️</button><button title="Добавить подсекцию" onclick="addReqSubSec(event,'${s.id}')">＋</button></span></div>`;
    if(exp) for(const k of kids) h+=node(k,d+1);
    return h; };
  for(const s of rlibChildren('')) html+=node(s,0);
  $('rtree').innerHTML=html;
}
window.reqDrop=async(e,secId)=>{ e.preventDefault(); e.stopPropagation(); document.querySelectorAll('.qrow.dropt').forEach(x=>x.classList.remove('dropt')); const d=window._drag; window._drag=null; if(!d) return;
  try{
    if(d.kind==='req') await api('/requirements/'+d.id,{method:'PATCH',body:JSON.stringify({sectionId:secId||null})});
    else if(d.kind==='rsection'){ if(d.id===secId) return; await api('/requirement-sections/'+d.id,{method:'PATCH',body:JSON.stringify({parentId:secId||null})}); }
    views.requirements();
  }catch(err){ alert(err.message); }
};
window.renameReqSec=async(e,id)=>{ e.stopPropagation(); const s=(window._rlib.secs||[]).find(x=>x.id===id); const name=prompt('Новое название секции:', s?s.name:''); if(!name) return; try{ await api('/requirement-sections/'+id,{method:'PATCH',body:JSON.stringify({name})}); views.requirements(); }catch(err){ alert(err.message); } };
window.addReqSubSec=async(e,parentId)=>{ e.stopPropagation(); const name=prompt('Название подсекции:'); if(!name) return; try{ await api(`/projects/${PID}/requirement-sections`,{method:'POST',body:JSON.stringify({name,parentId})}); window._rlibExp.add(parentId); views.requirements(); }catch(err){ alert(err.message); } };
window.selReqSec=id=>{ window._reqSecSel=id; renderReqTree(); renderReqItems(); };
window.togReqSec=id=>{ if(window._rlibExp.has(id)) window._rlibExp.delete(id); else window._rlibExp.add(id); renderReqTree(); };
window.delReqSec=async()=>{ const id=window._reqSecSel; if(!id) return; if(!confirm('Удалить секцию? Требования внутри не удаляются.')) return; try{ await api('/requirement-sections/'+id,{method:'DELETE'}); window._reqSecSel=''; views.requirements(); }catch(e){ alert(e.message); } };
function renderReqItems(){
  const {reqs,secs}=window._rlib; const sel=window._reqSecSel; const sec=secs.find(s=>s.id===sel);
  const inSec=reqs.filter(r=>(r.sectionId||'')===sel);
  const title=sel===''?'Все (без секции)':(sec?esc(sec.name):'—');
  let h=`<h2 style="margin-top:0">${title} <span class="muted">— ${inSec.length} требований</span> ${sel?`<button class="ghost" onclick="delReqSec()" style="padding:3px 8px">🗑 секцию</button>`:''}</h2><table><thead><tr><th>ID</th><th>Title</th><th>Priority</th><th>Status</th><th>Impl%</th><th>Type</th></tr></thead><tbody>`;
  h+=inSec.map(r=>`<tr draggable="true" ondragstart="qaDragStart(event,'req','${r.id}')" style="cursor:pointer" onclick="reqDetail('${r.id}')"><td class="gid">${esc(r.globalId)}</td><td>${esc(r.title)}</td><td>${pri(r.priority)}</td><td><span class="pill">${esc(r.status)}</span></td><td>${pct(r.implementationPercent)}</td><td class="muted">${esc(r.type)}</td></tr>`).join('');

function diffVersions(){
  const {list}=window._vers; const a=list.find(v=>v.versionNumber===+$('vFrom').value), b=list.find(v=>v.versionNumber===+$('vTo').value);
  if(!a||!b){ $('vDiffOut').innerHTML='<p class="muted">выберите версии</p>'; return; }
  const sa=a.snapshotJson||{}, sb=b.snapshotJson||{}; const skip=new Set(['id','createdAt','updatedAt','currentVersionNumber','updatedBy','createdBy','isDeleted','deletedAt','projectId']);
  const keys=[...new Set([...Object.keys(sa),...Object.keys(sb)])].filter(k=>!skip.has(k)).sort();
  const norm=v=>v==null?'':(typeof v==='object'?JSON.stringify(v):String(v));
  const rows=keys.filter(k=>norm(sa[k])!==norm(sb[k])).map(k=>`<tr><td class="gid">${esc(k)}</td><td style="background:color-mix(in srgb,var(--red) 9%,transparent);white-space:pre-wrap">${esc(norm(sa[k]))||'<span class="muted">∅</span>'}</td><td style="background:color-mix(in srgb,#1f9d57 12%,transparent);white-space:pre-wrap">${esc(norm(sb[k]))||'<span class="muted">∅</span>'}</td></tr>`).join('');
  $('vDiffOut').innerHTML=rows?`<table><thead><tr><th>Поле</th><th>v${a.versionNumber}</th><th>v${b.versionNumber}</th></tr></thead><tbody>${rows}</tbody></table>`:'<p class="muted">различий нет</p>';
}

  const items=await loadList(`/projects/${PID}/traceability`);
  $('trc').innerHTML=`<div style="overflow:auto"><table><thead><tr><th>Req</th><th>Title</th><th>Priority</th><th>Impl</th><th>TCs</th><th>Auto%</th><th>Last</th><th>Coverage</th></tr></thead><tbody>
    ${items.map(r=>`<tr style="cursor:pointer" onclick="reqDetail('${r.requirementId}')"><td class="gid">${esc(r.globalId)}</td><td>${esc(r.title)}</td><td>${pri(r.priority)}</td><td>${r.implementationPercent||0}%</td><td>${r.linkedTestCasesCount||0}</td><td>${pct(r.automationCoveragePercent)}</td><td class="muted">${esc(r.lastValidationStatus||'—')}</td><td><span class="pill${r.coverageStatus==='NotCovered'?' crit':(/Covered|Automated/.test(r.coverageStatus)?' ok':' warn')}">${esc(r.coverageStatus)}</span></td></tr>`).join('')||'<tr><td colspan=8 class="muted">нет требований</td></tr>'}
  </tbody></table></div>`;
};

// ---- Trash ----
views.trash=async()=>{
  $('main').innerHTML='<h1>🗑 Корзина</h1><p class="muted">Удалённые сущности (soft delete). Восстановление возвращает их в проект.</p><div id="trashList"><span class="spin"></span></div>';
  const items=await loadList(`/projects/${PID}/trash`);
  $('trashList').innerHTML=`<table><thead><tr><th>ID</th><th>Тип</th><th>Название</th><th>Удалено</th><th></th></tr></thead><tbody>
    ${items.map(it=>`<tr><td class="gid">${esc(it.globalId||'')}</td><td class="muted">${esc(it.type)}</td><td>${esc(it.title)}</td><td class="muted">${it.deletedAt?new Date(it.deletedAt).toLocaleString():''}</td><td><button class="ghost" onclick="trashRestore('${it.entity}','${it.id}')">♻️ Восстановить</button></td></tr>`).join('')||'<tr><td colspan=5 class="muted">корзина пуста</td></tr>'}
  </tbody></table>`;
};
window.trashRestore=async(entity,id)=>{ try{ await api(`/${entity}/${id}/restore`,{method:'POST',body:'{}'}); views.trash(); }catch(e){ alert(e.message); } };

// ---- Global search ----
let searchT;
$('globalSearch').addEventListener('input',e=>{ clearTimeout(searchT); const q=e.target.value.trim(); if(q.length<2){ $('searchResults').classList.remove('open'); return; } searchT=setTimeout(async()=>{ try{ const d=await api(`/projects/${PID}/search?query=${encodeURIComponent(q)}`); $('searchResults').innerHTML=(d.items||[]).map(it=>`<a href="${esc(it.directUrl)}" onclick="return openEntity(event,'${it.entityType}','${it.id}')"><span class="gid">${esc(it.globalId||'')}</span> ${esc(it.title||'')} <span class="muted">${esc(it.entityType)}${it.isDeleted?' · deleted':''}</span></a>`).join('')||'<a class="muted">ничего</a>'; $('searchResults').classList.add('open'); }catch(_){} },250); });
window.openEntity=(e,type,id)=>{ e.preventDefault(); $('searchResults').classList.remove('open'); $('globalSearch').value=''; if(type==='Requirement') reqDetail(id); else if(type==='TestCase') tcDetail(id); else if(type==='TestRun') trDetail(id); else { location.hash='#/'+(type==='AutomatedTest'?'automation':type==='Checklist'?'checklists':'dashboard'); } return false; };
document.addEventListener('click',e=>{ if(!e.target.closest('.searchbox')) $('searchResults').classList.remove('open'); });

boot();
</script>
</body>
</html>
