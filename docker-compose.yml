services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    ports:
      - "54323:5432"
    volumes:
      - orchestrator_mvp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-searchify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-searchify-minio-secret}
    # Без публикации host-портов: на хосте уже есть отдельный MinIO на 9000.
    # Приложение обращается к этому MinIO по внутренней сети compose (minio:9000).
    expose:
      - "9000"
      - "9001"
    volumes:
      - orchestrator_minio:/data
    restart: unless-stopped

  app:
    build:
      context: .
    env_file: .env
    environment:
      APP_PORT: ${APP_PORT:-4321}
      # Object storage (MinIO) for uploaded question images.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-searchify}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-searchify-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-searchify-uploads}
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL:-}
      YOUTRACK_TOKEN_FILE: /run/secrets/youtrack_token
      YOUTRACK_WEBHOOK_SECRET: ${YOUTRACK_WEBHOOK_SECRET:-}
      YOUTRACK_QUERY: ${YOUTRACK_QUERY:-}
      YOUTRACK_TRIGGER_STATE: ${YOUTRACK_TRIGGER_STATE:-In Progress}
      YOUTRACK_PIPELINE_PATH: ${YOUTRACK_PIPELINE_PATH:-core/orchestration/pipeline.v1.yaml}
      IMPL_WORKSPACE: /workspace
      COMPOSE_PROJECT: shiptify-orchestrator
      DEPLOY_HOST_PATH: /home/user/ka-prod-deploy
      APP_IMAGE: shiptify-orchestrator-app
      # Dedicated long-lived Claude auth (from `claude setup-token`) — does NOT share
      # the host OAuth file, so no refresh conflicts with openclaw. Used by both the
      # answer engine (root) and the implement agent (node).
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "4321:${APP_PORT:-4321}"
    volumes:
      - ./data:/app/data
      - /home/user/.openclaw/workspace/shiptify/ai-orchestrator/ai-orchestrator/secrets/openai_api_key:/run/secrets/openai_api_key:ro
      - /home/user/openclaw/test-youtrack:/run/secrets/youtrack_token:ro
      # Ideas "implement" pipeline: edit the deploy repo, push, redeploy via host docker.
      # Claude auth comes from CLAUDE_CODE_OAUTH_TOKEN env (no shared OAuth file).
      - /home/user/ka-prod-deploy:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/user/.ssh:/root/.ssh:ro
      - /home/user/.ssh:/home/node/.ssh:ro
    command: ["sh","-lc","until node -e \"const net=require('net');const s=net.connect(5432,'db');s.on('connect',()=>process.exit(0));s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),500);\"; do echo 'waiting for db...'; sleep 1; done; npm run db:push && npm run start:app"]
    restart: unless-stopped

  worker:
    build:
      context: .
    env_file: .env
    environment:
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL:-}
      YOUTRACK_TOKEN_FILE: /run/secrets/youtrack_token
      YOUTRACK_WEBHOOK_SECRET: ${YOUTRACK_WEBHOOK_SECRET:-}
      YOUTRACK_QUERY: ${YOUTRACK_QUERY:-}
      YOUTRACK_TRIGGER_STATE: ${YOUTRACK_TRIGGER_STATE:-In Progress}
      YOUTRACK_PIPELINE_PATH: ${YOUTRACK_PIPELINE_PATH:-core/orchestration/pipeline.v1.yaml}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - /home/user/.openclaw/workspace/shiptify/ai-orchestrator/ai-orchestrator/secrets/openai_api_key:/run/secrets/openai_api_key:ro
      - /home/user/openclaw/test-youtrack:/run/secrets/youtrack_token:ro
    command: ["sh","-lc","npm run start:worker"]
    restart: unless-stopped

volumes:
  orchestrator_mvp_pg:
  orchestrator_minio:
