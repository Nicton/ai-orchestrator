apiVersion: v1
kind: Service
metadata:
  name: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 4321
      targetPort: 4321
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: app
          image: datamola-ai/00_dnd_ai_orchestrator_design:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4321
          env:
            - name: APP_PORT
              value: "4321"
            - name: DATABASE_URL
              value: "postgresql://orchestrator:orchestrator@shared-postgres:5432/orchestrator"
            - name: OPENAI_API_KEY_FILE
              value: "/run/secrets/openai_api_key"
          volumeMounts:
            - name: openai
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: openai
          secret:
            secretName: openai-secret
