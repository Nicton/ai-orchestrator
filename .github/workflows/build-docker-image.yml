name: Build Docker image
on:
  push:
    branches:
      - develop
      - 'stand-*'
      - 'release/**'
      - main
      - stable
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
      - 'v[0-9]*.[0-9]*'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DOCKER_IMAGE_NAME: 00_dnd_ai_orchestrator_design
  DOCKERHUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKERHUB_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    container:
      image: datamolahub/00_base_datamola_ci_runner:ubuntu25.10-node22
    steps:
      - uses: actions/checkout@v4

      - name: Set Docker image tag
        shell: bash
        run: |
          DOCKER_IMAGE_TAG="stable"
          echo "DOCKER_IMAGE_TAG=${DOCKER_IMAGE_TAG}" >> $GITHUB_ENV
          echo "DOCKER_BUILD_ARGS=" >> $GITHUB_ENV
          cp Dockerfile.jvm Dockerfile || true

      - name: Build Docker image
        run: |
          /app/docker/build_docker_image_with_tag.sh
